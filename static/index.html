<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SAMARITAN</title>
  <style>
    /* ─── Google Fonts fallback (closest free mono to FF Magda Clean Mono) ─── */
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Nova+Mono&display=swap');

    /* ─── Reset & base ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #ffffff;
      --bg-edge:    #b0b0b0;
      --bg-mid:     #d8d8d8;
      --text:       #000000;
      --red:        #fe2d2d;
      --red-dark:   #330000;
      --red-mid:    #cc0000;
      --bar:        #000000;
      --bar-text:   #ffffff;
      --font: 'Share Tech Mono', 'Nova Mono', 'Courier New', monospace;
    }

    /* ─── Dark mode theme (toggled by #screen_mode dark) ─── */
    /* NOTE: transition duration below must match THEME_TRANSITION_MS in JS */
    [data-theme="dark"] {
      --bg:         #000000;
      --bg-edge:    #1a1a1a;
      --bg-mid:     #0d0d0d;
      --text:       #ffffff;
      --bar:        #111111;
      --bar-text:   #ffffff;
      /* red accents unchanged in dark mode */
    }

    /* ─── Theme transition — applied to all elements using CSS vars ─── */
    body,
    .sidebar, .sidebar-line, .sidebar-block, .sidebar-dot, .sidebar-small-text,
    #status-bar, #control-bar,
    #word-display, #word-rule,
    #response-panel,
    #text-input, #text-input-panel,
    #kbd-btn, #mic-btn, #send-btn,
    #error-flash {
      transition:
        background-color 1s ease,
        background 1s ease,
        color 1s ease,
        border-color 1s ease,
        opacity 1s ease;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: radial-gradient(ellipse at center,
        var(--bg) 0%,
        var(--bg-mid) 55%,
        var(--bg-edge) 100%
      );
      font-family: var(--font);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: none; /* Samaritan hides the cursor */
    }

    /* ─── Scanline overlay ─── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.03) 3px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* ─── Three-column layout ─── */
    #layout {
      display: flex;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0; left: 0;
    }

    .sidebar {
      width: 17.5%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 40px;
      gap: 18px;
      opacity: 0.35;
    }

    .sidebar-line {
      width: 60%;
      height: 1px;
      background: var(--text);
    }

    .sidebar-block {
      width: 60%;
      height: 6px;
      background: var(--text);
    }

    .sidebar-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text);
    }

    .sidebar-small-text {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text);
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
    }

    /* ─── Center stage ─── */
    #center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* ─── Status bar (top) ─── */
    #status-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      background: var(--bar);
      color: var(--bar-text);
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      padding: 6px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--red);
      animation: blink-dot 1200ms ease-in-out infinite;
    }

    @keyframes blink-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.1; }
    }

    /* ─── Main display area ─── */
    #display {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 160px;
      width: 100%;
      position: relative;
    }

    /* ─── Red triangle marker ─── */
    #triangle {
      width: 0;
      height: 0;
      border-left: 12px solid transparent;
      border-right: 12px solid transparent;
      border-top: 20px solid var(--red);
      margin-bottom: 20px;
      animation: triangle-pulse 1000ms ease-in-out infinite alternate;
    }

    @keyframes triangle-pulse {
      from { border-top-color: var(--red-dark); }
      to   { border-top-color: var(--red); }
    }

    /* ─── Word display ─── */
    #word-display {
      font-size: 2.4em;
      font-weight: bold;
      letter-spacing: 8px;
      text-transform: uppercase;
      text-align: center;
      color: var(--text);
      min-height: 1.4em;
      opacity: 0;
      transition: opacity 180ms ease-in-out;
      user-select: none;
      padding: 0 20px;
      max-width: 80%;
      word-break: break-all;
    }

    #word-display.visible {
      opacity: 1;
    }

    /* ─── Horizontal rule below word ─── */
    #word-rule {
      height: 2px;
      background: var(--text);
      margin-top: 14px;
      width: 0;
      transition: width 200ms ease-out;
    }

    /* ─── Terminal panel (long responses) ─── */
    #terminal-panel {
      display: none;
      position: absolute;
      top: 30px;      /* below status bar */
      bottom: 204px;  /* above bottom-zone (160px) + control bar (44px) */
      left: 0; right: 0;
      padding: 18px 24px;
      overflow-y: auto;
      font-size: 0.88em;
      letter-spacing: 2px;
      line-height: 1.8;
      color: var(--text);
      text-align: left;
      text-transform: uppercase;
      scrollbar-width: thin;
      scrollbar-color: var(--red-mid) transparent;
      white-space: pre-wrap;
      word-break: break-word;
      z-index: 10;   /* above #display triangle/word-display */
    }

    #terminal-panel.active { display: block; }

    #terminal-panel::-webkit-scrollbar { width: 4px; }
    #terminal-panel::-webkit-scrollbar-thumb { background: var(--red-mid); }
    #terminal-panel::-webkit-scrollbar-track { background: transparent; }

    /* blinking cursor at end of terminal output */
    #terminal-cursor {
      display: inline-block;
      width: 8px;
      height: 1em;
      background: var(--red);
      vertical-align: text-bottom;
      animation: blink-cursor 600ms step-end infinite;
    }

    @keyframes blink-cursor {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ─── Idle message ─── */
    #idle {
      font-size: 1.1em;
      letter-spacing: 6px;
      color: #000000;
      background: #ffffff;
      border: 2px solid #ffffff;
      padding: 4px 14px 5px;
      display: inline-block;
    }

    [data-theme="dark"] #idle {
      color: #ffffff;
      background: #000000;
      border: 2px solid #ffffff;
    }

    #idle.blink {
      animation: blink-idle 900ms step-end infinite;
    }

    @keyframes blink-idle {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ═══════════════════════════════════════════════════════════
       KEYWORD CARDS — stacked on right side of center column
       ═══════════════════════════════════════════════════════════ */

    /* Container that holds up to 3 visible cards */
    #card-stack {
      position: absolute;
      top: 36px;
      right: 8px;
      width: 220px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 20;
      pointer-events: none;
    }

    /* Base card shell */
    .kw-card {
      font-family: 'Barlow Semi Condensed', var(--font);
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      display: none;       /* hidden cards take no space */
      opacity: 0;
      transform: translateX(30px);
      width: 100%;
    }

    /* shown = in DOM and animating in */
    .kw-card.shown {
      display: block;
      transition: opacity 400ms ease, transform 400ms ease;
    }

    .kw-card.visible {
      opacity: 1;
      transform: translateX(0);
    }

    /* ── INITIATIVE card (Dominant Mandate style) ── */
    .kw-initiative {
      background: #000000;
      border: 2px solid #ffffff;
      padding: 0 0 4px 0;
      color: #ffffff;
    }

    .kw-initiative .kw-title-bar {
      background: #717171;
      color: #000000;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 6px;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
      letter-spacing: 2px;
    }

    .kw-initiative .kw-label-row {
      display: flex;
      align-items: center;
      padding: 5px 6px 2px;
      gap: 6px;
    }

    .kw-initiative .kw-keyword-badge {
      background: #cc0000;
      color: #ffffff;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      white-space: nowrap;
    }

    .kw-initiative .kw-body {
      color: #ffffff;
      font-size: 11px;
      padding: 4px 8px 4px;
      line-height: 1.6;
      min-height: 1.4em;
    }

    .kw-initiative .kw-footer-bar {
      background: #555555;
      height: 5px;
      margin: 4px -0px 0;
    }

    /* ── ASSET card (Subject Identified style) ── */
    .kw-asset {
      color: #ffffff;
    }

    .kw-asset .kw-title-bar {
      background: #000000;
      color: #ffffff;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 6px;
      text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
      letter-spacing: 2px;
      display: inline-block;
      width: 100%;
    }

    .kw-asset .kw-subtitle-row {
      background: #606060;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 6px;
      border-top: 2px solid #aaa;
    }

    .kw-asset .kw-subtitle-label {
      color: #ffffff;
      font-size: 10px;
      text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
    }

    .kw-asset .kw-keyword-badge {
      background: #cc0000;
      color: #ffffff;
      font-size: 10px;
      padding: 1px 5px;
      text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
    }

    .kw-asset .kw-content {
      background: #000000;
      border-bottom: 2px solid #aaa;
      padding: 5px 8px;
      color: #ffffff;
      font-size: 11px;
      line-height: 1.6;
      min-height: 1.4em;
    }

    /* ── TASK card (Subtitle-Task style) ── */
    .kw-task {
      color: #ffffff;
    }

    .kw-task .kw-title-bar {
      background: #000000;
      color: #ffffff;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 6px;
      text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
      letter-spacing: 2px;
      display: inline-block;
      width: 100%;
    }

    .kw-task .kw-subtitle-row {
      background: #606060;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 6px;
      border-top: 2px solid #aaa;
    }

    .kw-task .kw-subtitle-label {
      color: #ffffff;
      font-size: 10px;
      text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
    }

    .kw-task .kw-keyword-badge {
      background: #000000;
      color: rgba(255,0,0,0.9);
      font-size: 10px;
      padding: 1px 5px;
      text-shadow: 1px 1px 2px rgba(255,0,0,0.8);
    }

    .kw-task .kw-content {
      background: #000000;
      border-bottom: 2px solid #aaa;
      padding: 5px 8px;
      color: rgba(255,0,0,0.9);
      font-size: 11px;
      line-height: 1.6;
      min-height: 1.4em;
      text-shadow: 0 0 6px rgba(255,0,0,0.5);
    }

    /* ── THREAT card (Primary Threat style) ── */
    .kw-threat {
      background: #606060;
      padding: 0;
    }

    .kw-threat .kw-deviant-bar {
      background: #232323;
      color: #ffffff;
      font-size: 9px;
      padding: 2px 6px;
      letter-spacing: 3px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .kw-threat .kw-deviant-icon {
      width: 8px; height: 8px;
      background: #cc0000;
      border-radius: 50%;
      animation: threat-pulse 800ms ease-in-out infinite alternate;
      flex-shrink: 0;
    }

    @keyframes threat-pulse {
      from { background: #b40000; box-shadow: none; }
      to   { background: #ff0000; box-shadow: 0 0 6px rgba(255,0,0,0.8); }
    }

    .kw-threat .kw-title-bar {
      background: #cc0000;
      color: #ffffff;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 6px;
      text-align: center;
      text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
      letter-spacing: 3px;
      width: 100%;
    }

    .kw-threat .kw-rows {
      padding: 4px 6px 6px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .kw-threat .kw-row {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 22px;
      border: 2px solid #787878;
    }

    .kw-threat .kw-row-label {
      color: #ffffff;
      font-size: 9px;
      padding: 0 5px;
      flex-shrink: 0;
      width: 70px;
    }

    .kw-threat .kw-row-value {
      background: #cc0000;
      color: #ffffff;
      font-size: 9px;
      padding: 0 6px;
      flex: 1;
      height: 100%;
      display: flex;
      align-items: center;
      letter-spacing: 2px;
    }

    .kw-threat .kw-content {
      padding: 4px 8px 5px;
      color: #ffffff;
      font-size: 10px;
      line-height: 1.6;
      min-height: 1.2em;
      border-top: 1px solid rgba(180,180,180,0.3);
    }

    /* ─── Loader dots ─── */
    #loader {
      display: none;
      gap: 6px;
      align-items: center;
      margin-top: 8px;
    }

    #loader.active { display: flex; }

    .loader-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text);
      animation: loader-wave 1.2s ease-in-out infinite;
    }

    .loader-dot:nth-child(1) { animation-delay: 0ms; }
    .loader-dot:nth-child(2) { animation-delay: 120ms; }
    .loader-dot:nth-child(3) { animation-delay: 240ms; }
    .loader-dot:nth-child(4) { animation-delay: 360ms; }
    .loader-dot:nth-child(5) { animation-delay: 480ms; }
    .loader-dot:nth-child(6) { animation-delay: 600ms; }
    .loader-dot:nth-child(7) { animation-delay: 720ms; }

    @keyframes loader-wave {
      0%, 100% { transform: scaleY(1);   opacity: 0.3; }
      50%       { transform: scaleY(2.2); opacity: 1; }
    }

    /* ─── Bottom zone: shared by response panel and text input panel ─── */
    /* Both panels sit above the control bar, occupying the same space.   */
    /* Only one is visible at a time.                                      */

    #bottom-zone {
      position: absolute;
      bottom: 44px;   /* height of control bar */
      left: 0; right: 0;
      height: 160px;
      display: flex;
      align-items: stretch;
      z-index: 30;   /* above #card-stack (z-index:20) */
    }

    /* ─── Response panel ─── */
    #response-panel {
      display: none;
      position: absolute;
      top: 30px;      /* below status bar */
      bottom: 204px;  /* above bottom-zone + control bar */
      left: 0; right: 0;
      padding: 18px 24px;
      overflow-y: auto;
      font-size: 0.82em;
      letter-spacing: 2px;
      text-transform: uppercase;
      line-height: 1.8;
      color: var(--text);
      opacity: 0.55;
      text-align: left;
      scrollbar-width: none;
      white-space: pre-wrap;
      word-break: break-word;
      z-index: 9;   /* below terminal-panel (z-index:10) */
    }

    #response-panel.active { display: block; }
    #response-panel::-webkit-scrollbar { display: none; }

    /* ─── Text input panel (full-width, same zone) ─── */
    #text-input-panel {
      display: none;   /* shown only in kbd mode */
      flex: 1;
      flex-direction: column;
      align-items: stretch;
      padding: 16px 20px 10px;
      background: var(--bg);
      border-top: 1px solid rgba(128,128,128,0.4);
    }

    #text-input-panel.open {
      display: flex;
    }

    #text-input-label {
      color: var(--red);
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    #text-input {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 2px solid var(--red-mid);
      color: var(--text);
      font-family: var(--font);
      font-size: 1.5em;
      letter-spacing: 4px;
      text-transform: uppercase;
      outline: none;
      padding: 4px 0;
      caret-color: var(--red);
      width: 100%;
    }

    #text-input::placeholder {
      color: var(--text);
      opacity: 0.2;
      letter-spacing: 3px;
    }

    #send-btn {
      align-self: flex-end;
      margin-top: 10px;
      background: transparent;
      border: 1px solid var(--red-mid);
      color: var(--red-mid);
      cursor: pointer;
      padding: 6px 20px;
      font-family: var(--font);
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      transition: all 200ms;
    }

    #send-btn:hover  { background: var(--red-dark); color: #fff; border-color: var(--red); }
    #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ─── Control bar (bottom strip) ─── */
    #control-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: var(--bar);
      height: 44px;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
      z-index: 30;   /* above #card-stack (z-index:20) */
    }

    #prompt-label {
      color: var(--red);
      font-size: 16px;
      flex-shrink: 0;
    }

    /* voice transcript fills the middle */
    #voice-preview {
      flex: 1;
      font-size: 10px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-style: italic;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: center;
    }

    /* ─── Keyboard toggle button ─── */
    #kbd-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      padding: 4px 10px;
      font-family: var(--font);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      flex-shrink: 0;
      transition: all 200ms;
      height: 28px;
    }

    #kbd-btn:hover, #kbd-btn.active {
      border-color: var(--red-mid);
      color: var(--bar-text);
    }

    /* ─── Mic button ─── */
    #mic-btn {
      background: transparent;
      border: 1px solid var(--red-mid);
      color: var(--bar-text);
      cursor: pointer;
      padding: 4px 10px;
      font-family: var(--font);
      font-size: 13px;
      transition: all 200ms;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      height: 32px;
    }

    #mic-btn:hover { background: var(--red-dark); border-color: var(--red); }

    #mic-btn.listening {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
      animation: mic-pulse 600ms ease-in-out infinite alternate;
    }

    @keyframes mic-pulse {
      from { box-shadow: 0 0 4px var(--red); }
      to   { box-shadow: 0 0 20px var(--red), 0 0 40px rgba(254,45,45,0.3); }
    }

    #mic-icon { font-size: 15px; }
    #mic-btn.barge   { border-color: var(--red); color: var(--red); }
    #mic-btn.speaker { border-color: #f0a500;    color: #f0a500; }
    #mic-btn.unsupported { opacity: 0.3; cursor: not-allowed; }

    /* ─── Voice provider selector ─── */
    #stt-provider-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      padding: 4px 10px;
      font-family: var(--font);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      flex-shrink: 0;
      transition: all 200ms;
      height: 28px;
    }
    #stt-provider-btn:hover {
      border-color: rgba(255,255,255,0.5);
      color: var(--bar-text);
    }

    #voice-provider-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      padding: 0;
      width: 28px;
      font-family: var(--font);
      font-size: 13px;
      flex-shrink: 0;
      transition: all 200ms;
      height: 28px;
    }
    #voice-provider-btn:hover {
      border-color: rgba(255,255,255,0.5);
      color: var(--bar-text);
    }

    /* ─── Full-voice toggle button ─── */
    #full-voice-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      padding: 4px 10px;
      font-family: var(--font);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      flex-shrink: 0;
      transition: all 200ms;
      height: 28px;
    }

    #full-voice-btn:hover {
      border-color: var(--red-mid);
      color: var(--bar-text);
    }

    #full-voice-btn.active {
      border-color: var(--red);
      color: var(--red);
      animation: fv-pulse 1.2s ease-in-out infinite alternate;
    }

    @keyframes fv-pulse {
      from { box-shadow: 0 0 2px var(--red); }
      to   { box-shadow: 0 0 12px var(--red), 0 0 24px rgba(254,45,45,0.25); }
    }

    /* ─── Speaker icon waves: hidden until full-voice active ─── */
    #fv-wave1, #fv-wave2 { opacity: 0; transition: opacity 200ms; }
    #full-voice-btn.active #fv-wave1 { opacity: 1; }
    #full-voice-btn.active #fv-wave2 { opacity: 1; }

    /* ─── Keyboard SVG key dots ─── */
    #kbd-btn svg line { stroke-width: 3; stroke-linecap: round; }

    /* ─── Corner decorations ─── */
    .corner {
      position: absolute;
      width: 20px;
      height: 20px;
      opacity: 0.4;
    }

    .corner-tl { top: 40px; left: 0; border-top: 2px solid var(--text); border-left: 2px solid var(--text); }
    .corner-tr { top: 40px; right: 0; border-top: 2px solid var(--text); border-right: 2px solid var(--text); }
    .corner-bl { bottom: 48px; left: 0; border-bottom: 2px solid var(--text); border-left: 2px solid var(--text); }
    .corner-br { bottom: 48px; right: 0; border-bottom: 2px solid var(--text); border-right: 2px solid var(--text); }

    /* ─── Error flash ─── */
    #error-flash {
      position: absolute;
      bottom: 52px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--red);
      opacity: 0;
      transition: opacity 300ms;
      pointer-events: none;
      white-space: nowrap;
    }

    #error-flash.show { opacity: 1; }

    /* ─── Session ID (top right sidebar) ─── */
    #session-id {
      position: absolute;
      top: 10px;
      right: 20px;
      font-size: 9px;
      letter-spacing: 2px;
      color: rgba(0,0,0,0.3);
      text-transform: uppercase;
    }

    /* ─── Voice transcript preview ─── */
    #voice-preview {
      font-size: 10px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 2px;
      text-transform: uppercase;
      flex-shrink: 1;
      font-style: italic;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      text-align: center;
    }

    /* ─── Keyboard toggle button ─── */
    #kbd-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      padding: 5px 10px;
      font-family: var(--font);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      flex-shrink: 0;
      transition: all 200ms;
    }

    #kbd-btn:hover, #kbd-btn.active {
      border-color: var(--red-mid);
      color: var(--bar-text);
    }


    /* ─── Send button ─── */
    #send-btn {
      background: transparent;
      border: 1px solid var(--red-mid);
      color: var(--red);
      cursor: pointer;
      padding: 5px 14px;
      font-family: var(--font);
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      transition: all 200ms;
      flex-shrink: 0;
    }

    #send-btn:hover {
      background: var(--red-dark);
      color: #fff;
      border-color: var(--red);
    }

    #send-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* ─── Narrow phone screens (≤ 480px) ─── */
    @media (max-width: 480px) {
      /* Hide text-only provider toggle buttons — icons still visible */
      #stt-provider-btn { display: none; }
      /* Tighten bar so all icon buttons fit */
      #control-bar { gap: 6px; padding: 0 8px; }
      /* Hide sidebars */
      .sidebar { display: none; }
      /* Shrink voice preview text */
      #voice-preview { font-size: 9px; letter-spacing: 1px; }
    }
  </style>
</head>
