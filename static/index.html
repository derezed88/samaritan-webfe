<script>
// ═══════════════════════════════════════════════════════════
//  SAMARITAN INTERFACE — client logic
// ═══════════════════════════════════════════════════════════
// ── Auth ─────────────────────────────────────────────────────
// HTTP Basic Auth is handled by the browser — it prompts for credentials
// Key is injected by the server at render time — sent as Bearer on all requests.
// EventSource can't set headers so it uses ?token= query param instead.
const _apiKey = '%%SAMARITAN_API_KEY%%';
function authHeaders() {
  return _apiKey ? { 'Authorization': 'Bearer ' + _apiKey } : {};
}
function authedUrl(url) {
  if (!_apiKey) return url;
  const sep = url.includes('?') ? '&' : '?';
  return url + sep + 'token=' + encodeURIComponent(_apiKey);
}

// ── Session ID (unique per submit) ──────────────────────────
function makeSessionId() { return 'sam-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
// Persist SESSION_ID across background-reload cycles so agent-mcp session continuity is maintained.
const _savedSessionId = sessionStorage.getItem('sam_session_id');
let SESSION_ID = _savedSessionId || makeSessionId();
sessionStorage.setItem('sam_session_id', SESSION_ID);
document.getElementById('session-id-value').textContent = SESSION_ID.toUpperCase();

// ── DOM refs ────────────────────────────────────────────────
const wordDisplay    = document.getElementById('word-display');
const wordRule       = document.getElementById('word-rule');
const idleEl         = document.getElementById('idle');
const loaderEl       = document.getElementById('loader');
const terminalPanel  = document.getElementById('terminal-panel');
const terminalText   = document.getElementById('terminal-text');
const terminalCursor = document.getElementById('terminal-cursor');
const cardStack      = document.getElementById('card-stack');
const textInput      = document.getElementById('text-input');
const textInputPanel = document.getElementById('text-input-panel');
const sendBtn        = document.getElementById('send-btn');
const micBtn         = document.getElementById('mic-btn');
const micIcon        = document.getElementById('mic-icon');
const kbdBtn         = document.getElementById('kbd-btn');
const fullVoiceBtn       = document.getElementById('full-voice-btn');
const voiceProviderBtn   = document.getElementById('voice-provider-btn');
const voicePreview   = document.getElementById('voice-preview');
const statusText     = document.getElementById('status-text');
const statusDot      = document.getElementById('status-dot');
const responsePanel  = document.getElementById('response-panel');
const errorFlash     = document.getElementById('error-flash');
const clockEl        = document.getElementById('clock');

// ── Keyboard / voice mode toggle ─────────────────────────────
let kbdOpen      = false;
let voiceMode    = false;  // true only when user explicitly enabled mic
let fullVoiceMode = false; // true when xAI TTS is active

// ── Mic mode: 'off' | 'barge' | 'speaker' ────────────────────
// off    — mic disabled in full-voice mode
// barge  — mic always on; STT transcript during TTS triggers barge-in (AirPods/headphones)
// speaker — mic always on; STT transcripts suppressed during TTS (phone speaker safe)
let micMode = 'off';
const MIC_MODES = ['off', 'barge', 'speaker'];
const MIC_MODE_LABELS = { off: '🎤', barge: 'B', speaker: 'S' };

function setMicMode(mode) {
  micMode = mode;
  if (!isListening) micIcon.textContent = MIC_MODE_LABELS[mode];
  micBtn.classList.remove('barge', 'speaker');
  if (mode !== 'off') micBtn.classList.add(mode);
}

// ── Full-voice toggle ─────────────────────────────────────────
// Pre-create AudioContext on user gesture so iOS Safari allows it to play later.
function initAudioCtx() {
  if (!audioCtx || audioCtx.state === 'closed') {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    // Auto-resume if iOS suspends the context (e.g. after notification interruption)
    audioCtx.addEventListener('statechange', () => {
      if (audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
    });
  } else if (audioCtx.state === 'suspended') {
    audioCtx.resume().catch(() => {});
  }
}

// voiceProviderBtn wired after ttsProviders is defined (see end of TTS section)

fullVoiceBtn.addEventListener('click', () => {
  fullVoiceMode = !fullVoiceMode;
  fullVoiceBtn.classList.toggle('active', fullVoiceMode);
  voicePreview.textContent = fullVoiceMode ? 'SAMARITAN VOICE ACTIVE' : 'TAP MIC TO SPEAK';
  if (fullVoiceMode) initAudioCtx();  // unlock AudioContext while we have a user gesture
});

function setKbdMode(open) {
  kbdOpen = open;
  if (open) voiceMode = false;  // entering keyboard mode disables auto-restart
  // Swap panels: show text input OR response panel, never both
  textInputPanel.classList.toggle('open', open);
  // responsePanel visibility is managed independently via .active class
  kbdBtn.classList.toggle('active', open);
  voicePreview.style.visibility = open ? 'hidden' : '';
  if (!open) {
    textInput.blur();
    voicePreview.textContent = 'TAP MIC TO SPEAK';
  }
  // Stop mic when switching to keyboard mode
  if (open && isListening) {
    sttProviders[STT_PROVIDER]?.stop();
  }
}

// iOS requires focus() to be called synchronously inside the tap handler
kbdBtn.addEventListener('click', () => {
  resetIdleTimer();
  if (fullVoiceMode) initAudioCtx();  // unlock AudioContext while we have a user gesture
  const opening = !kbdOpen;
  setKbdMode(opening);
  if (opening) {
    textInput.focus();
  }
});

// ── Clock ───────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  clockEl.textContent = now.toTimeString().slice(0, 8);
}
updateClock();
setInterval(updateClock, 1000);

// ── Config ───────────────────────────────────────────────────
const DEBUG                   = false; // show debug/error flash messages at bottom of screen
const IDLE_TIMEOUT_SEC        = 300;   // seconds before screen returns to idle message
const THEME_TRANSITION_MS     = 3000;  // ms for dark/light crossfade (must match CSS transition duration)
const LONG_RESPONSE_THRESHOLD = 10;    // words — responses >= this use terminal display instead of word flash
const TERMINAL_CHAR_DELAY_MS  = 18;    // ms per character in terminal typewriter effect
const CARD_CYCLE_DELAY_MS     = 5000;  // ms each group of 3 cards is shown when cycling
let   TTS_PROVIDER            = 'inworld';              // active TTS provider: 'xai' | 'inworld'
const XAI_VOICE               = 'ara';              // xAI realtime voice: Eve | Ara | Rex | Sal | Leo
const INWORLD_VOICE           = 'Evelyn';           // Inworld voice name
const INWORLD_MODEL           = 'inworld-tts-1.5-max'; // Inworld model ID
const INWORLD_SPEAKING_RATE   = 1.3;                // 0.5–1.5× native speed
const INWORLD_TEMPERATURE     = 2.0;                // 0–2; expressiveness

// ── STT config ───────────────────────────────────────────────
let   STT_PROVIDER            = 'deepgram';        // 'webspeech' | 'deepgram'
const DG_MODEL                = 'nova-3';           // nova-3 | nova-2 | enhanced
const DG_ENCODING             = 'linear16';         // linear16 (raw PCM from AudioWorklet)
const DG_SAMPLE_RATE          = 16000;              // Hz — must match AudioContext sampleRate
const DG_EOT_TIMEOUT_MS       = 800;                // ms silence → endpointing/speech_final (min ~300ms)
const DG_UTTERANCE_END_MS     = 1000;               // ms silence → UtteranceEnd event (min 1000ms per Deepgram)
const DG_EOT_THRESHOLD        = 0.95;               // endpointing confidence threshold (0–1)
const DG_LANGUAGE             = 'en-US';
const DG_INTERIM_RESULTS      = true;               // show partial transcripts in preview
const DG_PUNCTUATE            = true;
const STT_CONFIRM_BEEP        = true;               // audible beep on STT prompt received
const STT_BEEP_FREQ_HZ        = 880;                // beep pitch in Hz (440=A4, 880=A5)
const STT_BEEP_DURATION_MS    = 80;                 // beep length in ms
const STT_BEEP_GAIN           = 0.15;               // beep volume 0–1
// Speaker-mode ambient noise guards (applied only when micMode === 'speaker')
const STT_SPEAKER_COOLDOWN_MS    = 2000;            // ms after TTS ends before accepting STT finals
const STT_SPEAKER_MIN_WORDS      = 3;               // ignore finals with fewer words during cooldown
const STT_READY_CHIME            = true;            // play ascending two-tone chime when cooldown clears
const STT_READY_CHIME_FREQ_LO    = 523;             // low note Hz  (C5)
const STT_READY_CHIME_FREQ_HI    = 784;             // high note Hz (G5)
const STT_READY_CHIME_NOTE_MS    = 80;              // duration of each note in ms
const STT_READY_CHIME_GAP_MS     = 40;              // gap between notes in ms
const STT_READY_CHIME_GAIN       = 0.15;            // chime volume 0–1

// Keyword → card-type mapping. Add/remove entries freely.
// type: 'initiative' | 'asset' | 'task' | 'threat'
const KEYWORD_CARDS = {
  'INITIATIVE:': { type: 'initiative' },
  'ASSET:':      { type: 'asset'      },
  'TASK:':       { type: 'task'       },
  'THREAT:':     { type: 'threat'     },
};

// ── State ────────────────────────────────────────────────────
let isStreaming    = false;
let isSpeaking     = false;
let _sttCooldownUntil = 0;  // timestamp (ms) — STT finals suppressed until this time in speaker mode
let wordQueue      = [];
let wordAnimating  = false;
let fullResponse   = '';
let idleTimer      = null;
let activeEvtSource = null;  // current SSE stream — closed on each new submit

// ── Utilities ────────────────────────────────────────────────
function setStatus(text, active = false) {
  statusText.textContent = text.toUpperCase();
  statusDot.style.animationPlayState = active ? 'running' : 'paused';
  statusDot.style.opacity = active ? null : '1';
}

function flashError(msg) {
  if (!DEBUG) return;
  errorFlash.textContent = '[ ' + msg.toUpperCase() + ' ]';
  errorFlash.classList.add('show');
  setTimeout(() => errorFlash.classList.remove('show'), 3000);
}

// ── #command handler ─────────────────────────────────────────
// Commands starting with # are intercepted client-side and never sent to agent-mcp.
// Add new commands as cases in handleCommand().

function cmdScreenMode(mode) {
  if (mode !== 'dark' && mode !== 'light') {
    flashError('usage: #screen_mode <dark|light>');
    return;
  }
  if (mode === 'dark') {
    document.body.setAttribute('data-theme', 'dark');
  } else {
    document.body.removeAttribute('data-theme');
  }
}

function handleCommand(raw) {
  const parts = raw.trim().split(/\s+/);
  const cmd   = parts[0].toLowerCase();
  const args  = parts.slice(1);
  switch (cmd) {
    case '#screen_mode': cmdScreenMode(args[0]); break;
    default: flashError('unknown command: ' + cmd);
  }
}

// ── Keyword card engine ───────────────────────────────────────
// Scans completed response text for KEYWORD: sentences,
// builds typed cards, stacks them on the right, cycles if > 3.

let cardCycleTimer = null;

function buildCardHTML(type, keyword, body) {
  switch (type) {
    case 'initiative':
      return `<div class="kw-card kw-initiative">
        <div class="kw-title-bar">SAMARITAN</div>
        <div class="kw-label-row">
          <span class="kw-keyword-badge">${keyword}</span>
        </div>
        <div class="kw-body" data-typetext="${escAttr(body)}"></div>
        <div class="kw-footer-bar"></div>
      </div>`;

    case 'asset':
      return `<div class="kw-card kw-asset">
        <div class="kw-title-bar">SUBJECT IDENTIFIED</div>
        <div class="kw-subtitle-row">
          <span class="kw-subtitle-label">DESIGNATION:</span>
          <span class="kw-keyword-badge">ASSET</span>
        </div>
        <div class="kw-content" data-typetext="${escAttr(body)}"></div>
      </div>`;

    case 'task':
      return `<div class="kw-card kw-task">
        <div class="kw-title-bar">SAMARITAN</div>
        <div class="kw-subtitle-row">
          <span class="kw-subtitle-label">TASK:</span>
          <span class="kw-keyword-badge">DIRECTIVE</span>
        </div>
        <div class="kw-content" data-typetext="${escAttr(body)}"></div>
      </div>`;

    case 'threat':
      return `<div class="kw-card kw-threat">
        <div class="kw-deviant-bar">
          <span class="kw-deviant-icon"></span>
          <span>/// DEVIANT ///</span>
        </div>
        <div class="kw-title-bar">PRIMARY THREAT</div>
        <div class="kw-rows">
          <div class="kw-row">
            <span class="kw-row-label">PROJECTION</span>
            <span class="kw-row-value">THREAT</span>
          </div>
          <div class="kw-row">
            <span class="kw-row-label">CONCLUSION</span>
            <span class="kw-row-value">ELIMINATE</span>
          </div>
        </div>
        <div class="kw-content" data-typetext="${escAttr(body)}"></div>
      </div>`;

    default: return '';
  }
}

function escAttr(str) {
  return str.replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function typeIntoEl(el, text, charDelay, onDone) {
  let i = 0;
  el.textContent = '';
  function tick() {
    if (i < text.length) {
      el.textContent += text[i++];
      setTimeout(tick, charDelay);
    } else {
      if (onDone) onDone();
    }
  }
  tick();
}

function parseKeywordCards(text) {
  // Split the response on any recognised keyword (case-insensitive).
  // Each segment after a keyword is that keyword's body text.
  const keys = Object.keys(KEYWORD_CARDS);
  if (!keys.length) return [];

  // Build a splitter that captures the keyword token
  const splitter = new RegExp(
    '(' + keys.map(k => k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|') + ')',
    'i'
  );

  const parts = text.split(splitter);
  // parts = [pre, KW1, body1, KW2, body2, ...]
  const cards = [];
  for (let i = 1; i < parts.length - 1; i += 2) {
    const kw   = parts[i].toUpperCase().trim();
    const body = (parts[i + 1] || '').trim().replace(/\s+/g, ' ');
    if (body && KEYWORD_CARDS[kw]) {
      cards.push({ type: KEYWORD_CARDS[kw].type, keyword: kw, body });
    }
  }
  return cards;
}

function showCardGroup(cardEls, groupIdx, allGroups) {
  // Hide all cards cleanly — remove inline styles so CSS base state takes over
  cardEls.forEach(el => {
    el.classList.remove('visible');
    el.classList.remove('shown');
    el.style.transform = '';
    el.style.opacity   = '';
  });

  // Show current group: add 'shown' (display:block), force reflow, then add 'visible' to trigger transition
  const group = allGroups[groupIdx];
  group.forEach((el, i) => {
    setTimeout(() => {
      el.classList.add('shown');
      // Force reflow so browser registers the display:block before the opacity/transform transition
      void el.offsetWidth;
      el.classList.add('visible');

      // Start typewriter after card is visible
      const bodyEl = el.querySelector('[data-typetext]');
      if (bodyEl && !bodyEl._typed) {
        bodyEl._typed = true;
        typeIntoEl(bodyEl, bodyEl.getAttribute('data-typetext'), TERMINAL_CHAR_DELAY_MS, null);
      }
    }, i * 150);
  });

  // Schedule next group if cycling
  if (allGroups.length > 1) {
    cardCycleTimer = setTimeout(() => {
      const next = (groupIdx + 1) % allGroups.length;
      showCardGroup(cardEls, next, allGroups);
    }, CARD_CYCLE_DELAY_MS);
  }
}

function renderKeywordCards(cards) {
  clearTimeout(cardCycleTimer);
  cardStack.innerHTML = '';
  if (!cards.length) return;

  // Build DOM elements
  const cardEls = cards.map(c => {
    const tmp = document.createElement('div');
    tmp.innerHTML = buildCardHTML(c.type, c.keyword, c.body);
    return tmp.firstElementChild;
  });

  cardEls.forEach(el => cardStack.appendChild(el));

  // Group into sets of 3 and cycle
  const groups = [];
  for (let i = 0; i < cardEls.length; i += 3) {
    groups.push(cardEls.slice(i, i + 3));
  }
  showCardGroup(cardEls, 0, groups);
}

function clearKeywordCards() {
  clearTimeout(cardCycleTimer);
  cardStack.innerHTML = '';
}

function showIdle(show) {
  idleEl.style.display = show ? 'block' : 'none';
}

function showLoader(show) {
  loaderEl.classList.toggle('active', show);
}

// ── Terminal display (long responses) ────────────────────────
function showTerminal(show) {
  terminalPanel.classList.toggle('active', show);
  if (!show) {
    terminalText.textContent = '';
    terminalCursor.style.display = 'none';
  } else {
    terminalCursor.style.display = 'inline-block';
  }
}

let terminalAnimating = false;

function runTerminal(text, onDone) {
  terminalAnimating = true;
  terminalText.textContent = '';
  terminalCursor.style.display = 'inline-block';
  showIdle(false);
  showTerminal(true);

  // Hide the word-flash area while terminal is active
  wordDisplay.classList.remove('visible');
  wordDisplay.textContent = '';
  wordRule.style.width = '0';

  let i = 0;
  function tick() {
    if (i < text.length) {
      terminalText.textContent += text[i++];
      // Auto-scroll to bottom as text grows
      terminalPanel.scrollTop = terminalPanel.scrollHeight;
      setTimeout(tick, TERMINAL_CHAR_DELAY_MS);
    } else {
      // Finished — leave cursor blinking, call done callback
      terminalAnimating = false;
      if (onDone) onDone();
    }
  }
  tick();
}

function showIdleScreen() {
  // Only activate idle screen when nothing is happening
  if (isStreaming || wordAnimating || wordQueue.length > 0) return;
  wordDisplay.classList.remove('visible');
  wordDisplay.textContent = '';
  wordRule.style.width = '0';
  responsePanel.textContent = '';
  responsePanel.classList.remove('active');
  fullResponse = '';
  showTerminal(false);   // clear terminal when idle screen takes over
  clearKeywordCards();
  // blink removed — CONNECTION ESTABLISHED stays static
  showIdle(true);
  setStatus('STANDBY', false);
}

function resetIdleTimer() {
  clearTimeout(idleTimer);
  idleEl.classList.remove('blink');
  idleTimer = setTimeout(showIdleScreen, IDLE_TIMEOUT_SEC * 1000);
}

// ── Word-by-word animation ────────────────────────────────────
//  Samaritan shows ONE word at a time, center screen.
//  Each word fades in, holds, fades out, then next word.
const WORD_FADE   = 180;   // ms opacity transition (set in CSS)
const WORD_HOLD   = 380;   // ms visible hold per word
const WORD_GAP    = 60;    // ms between words

function flashWord(word) {
  return new Promise(resolve => {
    wordDisplay.textContent = word;
    wordRule.style.width = Math.min(word.length * 22, 600) + 'px';
    // Force reflow then fade in
    void wordDisplay.offsetWidth;
    wordDisplay.classList.add('visible');

    setTimeout(() => {
      wordDisplay.classList.remove('visible');
      setTimeout(resolve, WORD_FADE + WORD_GAP);
    }, WORD_HOLD);
  });
}

async function drainWordQueue() {
  if (wordAnimating) return;
  wordAnimating = true;
  showIdle(false);

  while (wordQueue.length > 0) {
    const word = wordQueue.shift();
    if (word.trim()) {
      await flashWord(word.trim());
    }
  }

  // After queue empty — if still streaming, wait for more
  if (isStreaming) {
    // Brief pause then check again
    await new Promise(r => setTimeout(r, 80));
    if (wordQueue.length > 0) {
      wordAnimating = false;
      drainWordQueue();
      return;
    }
  }

  wordAnimating = false;
  if (!isStreaming) {
    wordDisplay.textContent = '';
    wordRule.style.width = '0';
    // Do NOT show idle here — timer fires after IDLE_TIMEOUT_SEC
  }
}

function enqueueTokens(text) {
  // Split incoming text into words (preserving non-space chunks)
  const words = text.split(/(\s+)/).filter(w => w.trim().length > 0);
  wordQueue.push(...words);
  if (!wordAnimating) {
    drainWordQueue();
  }
}

// ── Response panel (accumulated text history) ────────────────
function appendToPanel(text) {
  fullResponse += text;
  // Don't show panel yet — revealed after animation drains or terminal takes over
}

// ── xAI Realtime Voice (TTS) ─────────────────────────────────
/// ── TTS Engine ───────────────────────────────────────────────
// Hybrid approach: agent-mcp handles all reasoning/memory/tools (SSE flow),
// then the completed response text is sent to the TTS provider for audio.
// Switch providers by changing TTS_PROVIDER in the config block above.
//
// To add a new provider, add an entry to ttsProviders below implementing:
//   speak(text, clientSecret, onDone, onError) — start streaming audio
//   stop()                                      — abort any in-progress audio

let audioCtx      = null;  // Web Audio context (created on first user gesture)
let nextPlayAt    = 0;     // AudioContext time for next scheduled PCM chunk
const activeSrcs  = new Set(); // all scheduled BufferSource nodes (for barge-in stop)

// PCM16-LE bytes → AudioBuffer
function pcmBytesToAudioBuf(bytes, sampleRate) {
  const samples = bytes.length / 2;
  const buf  = audioCtx.createBuffer(1, samples, sampleRate);
  const data = buf.getChannelData(0);
  const view = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
  for (let i = 0; i < samples; i++) {
    data[i] = view.getInt16(i * 2, true) / 32768;
  }
  return buf;
}

// PCM16-LE base64 → AudioBuffer for Web Audio API (shared across providers)
function pcm16Base64ToFloat32(b64, sampleRate) {
  const bin   = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return pcmBytesToAudioBuf(bytes, sampleRate);
}

// Schedule an AudioBuffer for gapless sequential playback (shared across providers).
// Returns the wall-clock ms until playback of this buffer completes (for onDone timing).
function scheduleAudioChunk(audioBuf) {
  if (!audioCtx) return 0;
  const src = audioCtx.createBufferSource();
  src.buffer = audioBuf;
  src.connect(audioCtx.destination);
  const startAt = nextPlayAt > audioCtx.currentTime
    ? nextPlayAt
    : audioCtx.currentTime + 0.005;
  src.start(startAt);
  nextPlayAt = startAt + audioBuf.duration;
  activeSrcs.add(src);
  src.onended = () => activeSrcs.delete(src);
  // Return ms from now until this chunk finishes playing
  return (startAt + audioBuf.duration - audioCtx.currentTime) * 1000;
}

// Stop all scheduled/playing audio immediately — used for barge-in.
function stopAllAudio() {
  nextPlayAt = 0;
  for (const src of activeSrcs) {
    try { src.stop(); } catch (_) {}
  }
  activeSrcs.clear();
}

// ── Provider registry ─────────────────────────────────────────
const ttsProviders = {

  // ── xAI Realtime API ───────────────────────────────────────
  xai: {
    _ws: null,
    _clientSecret: null,   // ephemeral token for this response
    _cachedVtok:   null,   // pre-fetched token from SSE vtok event

    // Fetch (or reuse cached) ephemeral token. Returns token string or null.
    async _getToken() {
      if (this._clientSecret) return this._clientSecret;
      if (this._cachedVtok) {
        const j = this._cachedVtok; this._cachedVtok = null;
        this._clientSecret = j.client_secret?.value || j.value || j.token;
        if (this._clientSecret) return this._clientSecret;
      }
      try {
        const r = await fetch('/api/voice-token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...authHeaders() },
          body: JSON.stringify({ expires_in: 120 }),
        });
        if (r.ok) {
          const j = await r.json();
          this._clientSecret = j.client_secret?.value || j.value || j.token;
        }
      } catch (_) {}
      return this._clientSecret || null;
    },

    speak(text, _unused, onDone, onError) {
      (async () => {
        const clientSecret = await this._getToken();
        if (!clientSecret) { onError('voice token failed'); return; }
        this._speakWithToken(text, clientSecret, onDone, onError);
      })();
    },

    _speakWithToken(text, clientSecret, onDone, onError) {
      // Voice names must be capitalized per xAI docs (Eve, Ara, Rex, Sal, Leo)
      const voiceName = XAI_VOICE.charAt(0).toUpperCase() + XAI_VOICE.slice(1).toLowerCase();
      let ws;
      try {
        ws = new WebSocket('wss://api.x.ai/v1/realtime',
                           [`xai-client-secret.${clientSecret}`]);
      } catch (e) {
        onError('ws: ' + e.message.slice(0, 40));
        return;
      }
      this._ws = ws;

      ws.onopen = () => {
        ws.send(JSON.stringify({
          type: 'session.update',
          session: {
            modalities: ['audio'],
            voice: voiceName,
            output_audio_format: 'audio/pcm',
            turn_detection: null,
          },
        }));
        // "Say this: <text>" — direct command, prevents LLM paraphrasing
        ws.send(JSON.stringify({
          type: 'conversation.item.create',
          item: {
            type: 'message', role: 'user',
            content: [{ type: 'input_text', text: `Say this: ${text}` }],
          },
        }));
        ws.send(JSON.stringify({
          type: 'response.create',
          response: { modalities: ['audio'] },
        }));
      };

      ws.onmessage = (evt) => {
        let msg;
        try { msg = JSON.parse(evt.data); } catch (_) { return; }
        switch (msg.type) {
          case 'response.output_audio.delta':
            if (msg.delta) {
              try { scheduleAudioChunk(pcm16Base64ToFloat32(msg.delta, 24000)); }
              catch (e) { onError('pcm: ' + e.message.slice(0, 25)); }
            }
            break;
          case 'response.done':
            ws.close(); this._ws = null; onDone(); break;
          case 'error':
            ws.close(); this._ws = null;
            onError((msg.error?.message || 'voice error').slice(0, 60)); break;
        }
      };

      ws.onerror = () => { this._ws = null; onError('voice ws error'); };

      ws.onclose = (evt) => {
        if (this._ws === ws) this._ws = null;
        if (evt.code !== 1000 && evt.code !== 1005) onError('voice closed: ' + evt.code);
      };
    },

    stop() {
      if (this._ws) { try { this._ws.close(); } catch(_) {} this._ws = null; }
      this._clientSecret = null;
      this._cachedVtok   = null;
      stopAllAudio();
    },
  },

  // ── Inworld TTS (HTTP streaming) ───────────────────────────
  // Server proxies to api.inworld.ai/tts/v1/voice (batch endpoint, returns MP3).
  // clientSecret arg unused — no ephemeral token exchange needed.
  // Inworld streaming TTS — NDJSON stream, each line has base64 audioContent (MP3).
  // Chunks are decoded and scheduled as they arrive for low-latency gapless playback.
  inworld: {
    _abortCtrl: null,

    speak(text, _clientSecret, onDone, onError) {
      this._abortCtrl = new AbortController();
      const signal = this._abortCtrl.signal;

      (async () => {
        let resp;
        try {
          resp = await fetch('/api/tts/inworld', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', ...authHeaders() },
            body: JSON.stringify({ text, voice_id: INWORLD_VOICE, model_id: INWORLD_MODEL, speaking_rate: INWORLD_SPEAKING_RATE, temperature: INWORLD_TEMPERATURE }),
            signal,
          });
        } catch (e) {
          if (e.name !== 'AbortError') onError('inworld: ' + e.message.slice(0, 30));
          return;
        }
        if (!resp.ok) { onError('inworld http ' + resp.status); return; }

        // Read NDJSON stream — each chunk is a self-contained WAV file (RIFF header + PCM16-LE).
        // Strip the 44-byte WAV header and feed raw PCM to pcm16Base64ToFloat32 at 24kHz.
        const WAV_HEADER_BYTES = 44;
        const reader = resp.body.getReader();
        const txtDec = new TextDecoder();
        let buf = '';
        let lastChunkEndMs = 0;
        let gotAny = false;
        let errored = false;

        const scheduleWavChunk = (b64) => {
          const bin = atob(b64);
          if (bin.length <= WAV_HEADER_BYTES) return;
          const bytes = new Uint8Array(bin.length);
          for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
          // Slice off the 44-byte WAV header — remaining bytes are raw PCM16-LE at 24kHz
          const pcm = bytes.subarray(WAV_HEADER_BYTES);
          lastChunkEndMs = scheduleAudioChunk(pcmBytesToAudioBuf(pcm, 24000));
          gotAny = true;
        };

        try {
          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buf += txtDec.decode(value, { stream: true });
            const lines = buf.split('\n');
            buf = lines.pop();
            for (const line of lines) {
              const t = line.trim();
              if (!t) continue;
              try {
                const chunk = JSON.parse(t);
                if (chunk.error) { onError('inworld: ' + String(chunk.error).slice(0, 40)); errored = true; break; }
                const b64 = chunk.result?.audioContent || chunk.audioContent;
                if (b64) scheduleWavChunk(b64);
              } catch (_) {}
            }
            if (errored) break;
          }
        } catch (e) {
          if (e.name !== 'AbortError') onError('inworld stream: ' + e.message.slice(0, 30));
          return;
        }

        if (errored || !gotAny) { if (!errored) onError('inworld: no audio'); return; }
        setTimeout(onDone, lastChunkEndMs + 150);
      })();
    },

    stop() {
      if (this._abortCtrl) { this._abortCtrl.abort(); this._abortCtrl = null; }
      stopAllAudio();
    },
  },

};

// ── Wire voice provider button (after ttsProviders is defined) ───────────────
(function() {
  const PROVIDER_LABELS = { inworld: 'I', xai: 'X' };
  function updateVoiceProviderBtn() {
    voiceProviderBtn.textContent = PROVIDER_LABELS[TTS_PROVIDER] ?? TTS_PROVIDER[0].toUpperCase();
    voiceProviderBtn.title = `TTS: ${TTS_PROVIDER} — tap to switch`;
  }
  const providerOrder = Object.keys(ttsProviders);
  updateVoiceProviderBtn();
  voiceProviderBtn.addEventListener('click', () => {
    const idx = providerOrder.indexOf(TTS_PROVIDER);
    TTS_PROVIDER = providerOrder[(idx + 1) % providerOrder.length];
    updateVoiceProviderBtn();
    if (fullVoiceMode) initAudioCtx();
  });
})();

// ── TTS sentence pipeline ─────────────────────────────────────
// Sentences are queued as they arrive from SSE tok events.
// Each sentence is spoken in order; the next starts as soon as the
// previous finishes (gapless via scheduleAudioChunk / nextPlayAt).
// speakWithSamaritan() is now called once per sentence from the SSE
// tok handler, and once more at 'done' for any remaining buffer.

let _ttsSentenceQueue = [];    // sentences waiting to speak
let _ttsBusy          = false; // true while a provider.speak() is in flight
let _ttsWasKbd        = false; // passed through to waitForDrainThenListen
let _ttsDone          = false; // true after SSE 'done' — no more sentences coming

function _ttsFlush() {
  if (_ttsBusy || _ttsSentenceQueue.length === 0) return;
  const sentence = _ttsSentenceQueue.shift();
  const provider = ttsProviders[TTS_PROVIDER];
  _ttsBusy = true;
  isSpeaking = true;
  provider.speak(
    sentence,
    null,
    () => {                          // onDone for this sentence
      _ttsBusy = false;
      if (_ttsSentenceQueue.length > 0) {
        _ttsFlush();                 // speak next sentence immediately
      } else if (_ttsDone) {
        // All sentences spoken and SSE done — poll until Web Audio drains,
        // then clear isSpeaking. Needed for xAI where response.done arrives
        // before all scheduled PCM chunks finish playing.
        (function waitForAudio() {
          if (activeSrcs.size > 0) {
            setTimeout(waitForAudio, 100);
          } else {
            isSpeaking = false;
            if (micMode === 'speaker') startSpeakerCooldown();
            waitForDrainThenListen(_ttsWasKbd);
          }
        })();
      }
      // else: SSE still streaming — more sentences may arrive, wait
    },
    (err) => {                       // onError for this sentence
      _ttsBusy = false;
      isSpeaking = false;
      if (micMode === 'speaker') startSpeakerCooldown();
      flashError(err);
      if (_ttsDone) waitForDrainThenListen(_ttsWasKbd);
    },
  );
}

async function speakWithSamaritan(sentence, wasKbd, isLast) {
  // If nothing to speak and this is the last sentence, just signal done immediately.
  if (!sentence && isLast && !_ttsBusy && _ttsSentenceQueue.length === 0) {
    _ttsDone = true;
    isSpeaking = false;
    if (micMode === 'speaker') startSpeakerCooldown();
    waitForDrainThenListen(wasKbd);
    return;
  }

  // AudioContext must be pre-unlocked by a user gesture.
  if (!audioCtx || audioCtx.state === 'closed') {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  _ttsWasKbd = wasKbd;
  if (isLast) _ttsDone = true;

  if (!isSpeaking) {
    setStatus('SAMARITAN SPEAKING', true);
    voicePreview.textContent = fullVoiceMode ? 'SAMARITAN SPEAKING…' : 'TAP MIC TO SPEAK';
  }

  if (sentence) _ttsSentenceQueue.push(sentence);
  _ttsFlush();

  // Edge: isLast with empty sentence and queue already drained (silent response)
  if (isLast && !_ttsBusy && _ttsSentenceQueue.length === 0 && !isSpeaking) {
    isSpeaking = false;
    waitForDrainThenListen(wasKbd);
  }
}

// Reset TTS pipeline state at the start of each submit
function resetTtsPipeline() {
  // Cancel any in-flight TTS (Inworld fetch or xAI WebSocket)
  const provider = ttsProviders[TTS_PROVIDER];
  if (provider?.stop) provider.stop();  // xAI.stop() also clears its own token state
  _ttsSentenceQueue = [];
  _ttsBusy          = false;
  _ttsDone          = false;
}

// ── Submit ───────────────────────────────────────────────────
async function submit(textOverride) {
  const text = (textOverride || textInput.value).trim();
  if (!text) return;
  // If a prior stream is still open (e.g. after barge-in), force-close it now
  if (activeEvtSource) { activeEvtSource.close(); activeEvtSource = null; isStreaming = false; }
  if (isStreaming) return;

  // Intercept #commands — handle locally, never forward to agent-mcp
  if (text.startsWith('#')) {
    textInput.value = '';
    if (kbdOpen) setTimeout(() => textInput.focus(), 50);
    handleCommand(text);
    return;
  }

  resetIdleTimer();   // user is active — reset idle countdown
  const wasKbd = kbdOpen;
  textInput.value = '';
  textInput.blur();          // dismiss iOS keyboard immediately
  if (kbdOpen) setKbdMode(false);  // switch to response panel while waiting
  voicePreview.textContent = fullVoiceMode ? 'SAMARITAN VOICE ACTIVE' : 'TAP MIC TO SPEAK';
  isStreaming = true;
  wordQueue   = [];
  fullResponse = '';
  nextPlayAt  = 0;
  resetTtsPipeline();
  responsePanel.textContent = '';
  responsePanel.classList.remove('active');
  showTerminal(false);   // clear any previous long response
  clearKeywordCards();   // clear any previous keyword cards

  setStatus('PROCESSING', true);
  showIdle(false);
  showLoader(true);
  sendBtn.disabled = true;

  // Prefetch xAI voice token in parallel — only needed for xAI provider
  if (fullVoiceMode && TTS_PROVIDER === 'xai') {
    fetch('/api/voice-token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...authHeaders() },
      body: JSON.stringify({ expires_in: 120 }),
    }).then(r => r.ok ? r.json() : null)
      .then(j => { if (j) ttsProviders.xai._cachedVtok = j; })
      .catch(() => {});
  }

  try {
    // 1. Submit to agent-mcp via our proxy (retry once — Safari drops first post-load request)
    let submitResp;
    for (let attempt = 0; attempt < 3; attempt++) {
      try {
        if (attempt > 0) await new Promise(r => setTimeout(r, 600));
        submitResp = await fetch('/api/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...authHeaders() },
          body: JSON.stringify({ text, client_id: SESSION_ID }),
        });
        if (submitResp.ok) break;
      } catch (_) { if (attempt === 2) throw new Error('Submit failed after retries'); }
    }
    if (!submitResp?.ok) {
      throw new Error('Submit failed: ' + submitResp?.status);
    }

    showLoader(false);
    setStatus('RECEIVING', true);

    // 2. Open SSE stream — pass token via query param (EventSource can't set headers)
    const evtSource = new EventSource(authedUrl(`/api/stream/${SESSION_ID}`));
    activeEvtSource = evtSource;

    // Use onmessage (unnamed events) for cross-browser compatibility
    let streamDone = false;
    let ttsBuf = '';  // accumulates tok text until a sentence boundary
    const mySessionId = SESSION_ID;  // capture at open time; stale streams self-discard

    // Sentence boundary regex: end of sentence followed by space or end-of-string
    const SENT_RE = /[.!?][)"']?\s+|[.!?][)"']?$/;

    // Strip <<topic>> (optional ": ") prefix from LLM responses (topic-routing schema).
    // Accumulates tokens until the prefix pattern is fully matched or ruled out.
    let _pfxBuf = '';       // pending chars while resolving prefix
    let _pfxDone = false;   // true once prefix strip decision is settled for this turn
    function processToken(raw) {
      if (_pfxDone) { emitToken(raw); return; }
      _pfxBuf += raw;
      // Not a prefix at all — flush immediately
      if (!_pfxBuf.startsWith('<')) {
        _pfxDone = true; emitToken(_pfxBuf); _pfxBuf = ''; return;
      }
      // Try to match complete <<topic>> with optional ": " separator
      const m = _pfxBuf.match(/^<<[^>]*>>\s*(?::\s*)?/);
      if (m && m[0].includes('>>')) {
        // Matched — strip the prefix tag, emit whatever follows
        _pfxDone = true;
        const rest = _pfxBuf.slice(m[0].length);
        _pfxBuf = '';
        if (rest) emitToken(rest);
        return;
      }
      // Safety valve: if buffer is long but no match yet, flush as-is
      if (_pfxBuf.length > 80) {
        _pfxDone = true; emitToken(_pfxBuf); _pfxBuf = '';
      }
      // Otherwise keep accumulating
    }
    function emitToken(text) {
      if (!text) return;
      appendToPanel(text);
      enqueueTokens(text);
      if (fullVoiceMode) {
        ttsBuf += text;
        if (TTS_PROVIDER === 'xai') {
          let m;
          while ((m = SENT_RE.exec(ttsBuf)) !== null) {
            const end = m.index + m[0].length;
            const sentence = ttsClean(ttsBuf.slice(0, end));
            ttsBuf = ttsBuf.slice(end);
            if (sentence) speakWithSamaritan(sentence, wasKbd, false);
          }
        }
      }
    }

    function ttsClean(t) {
      return t
        .replace(/\[thinking[^\]]*\]/gi, '')   // [thinking…] markers
        .replace(/\[[^\]]*[▶◀][^\]]*\]/g, '')  // [tool ▶ name] and [tool ◀ result]
        .replace(/#{1,6}\s*/g, '')             // markdown headings
        .replace(/\*{1,3}([^*]*)\*{1,3}/g, '$1')  // bold/italic **x** *x* ***x***
        .replace(/_{1,3}([^_]*)_{1,3}/g, '$1')    // underline/italic __x__ _x_
        .replace(/~~([^~]*)~~/g, '$1')         // strikethrough
        .replace(/`{1,3}[^`]*`{1,3}/g, '')    // inline code and code blocks
        .replace(/'{3}/g, '')                  // triple single-quotes (code fence variant)
        .replace(/^[-*_]{3,}\s*$/gm, '')       // horizontal rules ---, ***, ___ (own line)
        .replace(/\s[-]{3,}\s/g, ' ')          // inline --- sequences
        .replace(/^\s*[-*+]\s+/gm, '')         // unordered list bullets
        .replace(/^\s*\d+\.\s+/gm, '')         // ordered list numbers
        .replace(/!?\[([^\]]*)\]\([^)]*\)/g, '$1')  // links and images → label only
        .replace(/[|\\]/g, ' ')                // table pipes, backslashes
        .replace(/[—–]/g, ', ')               // em dash, en dash → pause
        .replace(/…/g, '...')                  // ellipsis char → literal dots
        .replace(/[""]/g, '"')                 // smart double quotes → straight
        .replace(/['']/g, "'")                 // smart single quotes → straight apostrophe
        .replace(/&[a-z]+;/gi, ' ')            // HTML entities
        .replace(/[<>]/g, ' ')                 // angle brackets
        .replace(/[^\x20-\x7E\s]/g, ' ')      // strip remaining non-ASCII
        .replace(/\n+/g, ' ')
        .replace(/\s{2,}/g, ' ')               // collapse multiple spaces
        .trim();
    }

    function flushTtsBuf(isLast) {
      if (!fullVoiceMode) return;
      const clean = ttsClean(ttsBuf);
      ttsBuf = '';
      if (clean) speakWithSamaritan(clean, wasKbd, isLast);
      else if (isLast) speakWithSamaritan('', wasKbd, true);  // signal done even if nothing to speak
    }

    evtSource.onmessage = (e) => {
      if (streamDone || mySessionId !== SESSION_ID) { evtSource.close(); return; }
      try {
        const data = JSON.parse(e.data);
        if (data.type === 'tok') {
          processToken(data.text || '');
        } else if (data.type === 'flush') {
          // Intermediate checkpoint from agent-mcp (tool call in progress).
          // Intermediate checkpoint — tool round-trip done, final answer coming next.
          // Display tokens, reset TTS buffer (pre-flush content = markers, not speech).
          const token = data.text || '';
          if (token) { appendToPanel(token); enqueueTokens(token); }
          ttsBuf = '';  // discard pre-flush content from TTS (thinking/tool markers)
        } else if (data.type === 'vtok') {
          // xAI voice token pre-delivered over SSE — store directly on xAI provider
          ttsProviders.xai._cachedVtok = data.token;
        } else if (data.type === 'done') {
          streamDone = true;
          evtSource.close(); activeEvtSource = null;
          isStreaming = false;
          showLoader(false);
          sendBtn.disabled = false;

          const kwCards = parseKeywordCards(fullResponse);
          if (kwCards.length) renderKeywordCards(kwCards);

          if (fullVoiceMode) {
            // Flush any remaining buffer as the final sentence
            flushTtsBuf(true);
            wordQueue = [];
            wordAnimating = false;
          } else {
            const wordCount = fullResponse.trim().split(/\s+/).filter(w => w).length;
            if (wordCount >= LONG_RESPONSE_THRESHOLD) {
              wordQueue = [];
              wordAnimating = false;
              runTerminal(fullResponse.trim(), () => waitForDrainThenListen(wasKbd));
            } else {
              waitForDrainThenListen(wasKbd);
            }
          }
        } else if (data.type === 'error') {
          streamDone = true;
          evtSource.close(); activeEvtSource = null;
          isStreaming = false;
          showLoader(false);
          showIdle(false);
          sendBtn.disabled = false;
          flashError(data.message || 'stream error');
          // Always recover mic if voice was active — don't leave UI in dead ERROR state
          if (voiceMode || fullVoiceMode) {
            waitForDrainThenListen(wasKbd);
          } else {
            setStatus('ERROR', false);
          }
        }
      } catch (_) {}
    };

    // Native onerror (connection drop or auto-reconnect)
    evtSource.onerror = () => {
      if (streamDone) return;
      // CLOSED = permanent drop; CONNECTING = browser auto-reconnecting (treat same — abort)
      evtSource.close(); activeEvtSource = null;
      isStreaming = false;
      showLoader(false);
      showIdle(false);
      sendBtn.disabled = false;
      if (voiceMode || fullVoiceMode) {
        waitForDrainThenListen(wasKbd);
      } else {
        setStatus('STANDBY', false);
      }
    };

  } catch (err) {
    isStreaming = false;
    showLoader(false);
    showIdle(false);
    setStatus('ERROR', false);
    sendBtn.disabled = false;
    flashError(err.message || 'unknown error');
  }
}

// ── Event listeners ──────────────────────────────────────────
sendBtn.addEventListener('click', () => { if (fullVoiceMode) initAudioCtx(); submit(); });
textInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') submit();
});

// ── Auto-restart mic after response drains ───────────────────
// Called when the 'done' SSE event fires. Polls until the word
// animation queue is empty, then restarts recognition if in voice mode.
function waitForDrainThenListen(wasKbd) {
  if (wordAnimating || wordQueue.length > 0) {
    setTimeout(() => waitForDrainThenListen(wasKbd), 150);
    return;
  }
  // Queue drained (or terminal finished) — settle UI and start idle countdown
  showIdle(false);     // hide idle message until timeout fires
  // Show accumulated response text now that animation is done (if terminal not active)
  if (!terminalPanel.classList.contains('active') && fullResponse) {
    responsePanel.textContent = fullResponse;
    responsePanel.classList.add('active');
    responsePanel.scrollTop = responsePanel.scrollHeight;
  }
  // Terminal panel intentionally left visible — persists until next submit
  resetIdleTimer();    // idle screen appears only after IDLE_TIMEOUT_SEC of inactivity

  if (fullVoiceMode && !wasKbd && micMode !== 'off' && !micBtn.classList.contains('unsupported')) {
    // Full-voice mode (voice input): wait for audio to finish then reopen mic.
    const audioEndMs = audioCtx
      ? Math.max(0, (nextPlayAt - audioCtx.currentTime) * 1000)
      : 0;
    setStatus('STANDBY', false);
    setTimeout(() => {
      nextPlayAt = 0;
      if (!isStreaming && !isListening) {
        voiceMode = true;
        sttProviders[STT_PROVIDER]?.start();
      }
    }, audioEndMs + 800);
    return;
  }

  setStatus('STANDBY', false);
  if (wasKbd) {
    // Keyboard mode: reopen input panel so user can type the next message
    setTimeout(() => {
      setKbdMode(true);
      textInput.focus();
    }, 300);
  } else if (voiceMode && !micBtn.classList.contains('unsupported')) {
    // Voice mode: restart mic
    setTimeout(() => {
      if (!isStreaming && !isListening) {
        sttProviders[STT_PROVIDER]?.start();
      }
    }, 400);
  }
}

// ── Voice Input — STT provider registry ──────────────────────
// Each provider implements: start(), stop()
// Shared state used by both providers:
let isListening = false;

function onSttStart() {
  isListening = true;
  micBtn.classList.add('listening');
  micIcon.textContent = '●';   // listening indicator; mode label restored on stop
  voicePreview.textContent = '…';
  setStatus('LISTENING', true);
}

function onSttPartial(text) {
  voicePreview.textContent = text.toUpperCase().slice(0, 60) || '…';
  // Barge-in: only in 'barge' mode — stop TTS immediately when speech is heard
  if (isSpeaking && micMode === 'barge') {
    isSpeaking = false;
    ttsProviders[TTS_PROVIDER].stop();  // closes WS/fetch AND calls stopAllAudio()
  }
}

function beepConfirm() {
  if (!STT_CONFIRM_BEEP) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = STT_BEEP_FREQ_HZ;
    osc.type = 'sine';
    gain.gain.setValueAtTime(STT_BEEP_GAIN, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + STT_BEEP_DURATION_MS / 1000);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + STT_BEEP_DURATION_MS / 1000);
    osc.onended = () => ctx.close();
  } catch (_) {}
}

function beepReady() {
  // Ascending two-tone chime: signals cooldown cleared, mic open in speaker mode
  if (!STT_READY_CHIME) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const noteSec  = STT_READY_CHIME_NOTE_MS / 1000;
    const gapSec   = STT_READY_CHIME_GAP_MS  / 1000;
    [STT_READY_CHIME_FREQ_LO, STT_READY_CHIME_FREQ_HI].forEach((freq, i) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      const t0 = ctx.currentTime + i * (noteSec + gapSec);
      gain.gain.setValueAtTime(STT_READY_CHIME_GAIN, t0);
      gain.gain.exponentialRampToValueAtTime(0.001, t0 + noteSec);
      osc.start(t0);
      osc.stop(t0 + noteSec);
      if (i === 1) osc.onended = () => ctx.close();
    });
  } catch (_) {}
}

function startSpeakerCooldown() {
  // Called whenever TTS ends in speaker mode — sets cooldown and schedules ready chime
  _sttCooldownUntil = Date.now() + STT_SPEAKER_COOLDOWN_MS;
  setTimeout(beepReady, STT_SPEAKER_COOLDOWN_MS);
}

function onSttFinal(text) {
  const query = text.trim();
  if (!query) return;
  // Drop transcript if agent is still processing a prior turn — prevents
  // mid-ramble pauses from firing a second submit and getting a 0-char response.
  // Barge-in only exempted when TTS is actually playing (isSpeaking); while
  // waiting for LLM response (isStreaming, !isSpeaking) there's nothing to barge into.
  if (isStreaming && !(micMode === 'barge' && isSpeaking)) return;
  // In speaker mode: suppress while TTS is playing or during post-TTS cooldown.
  // Min word count only applies during cooldown (filters echo/ambient noise).
  // Outside cooldown, short responses like "yes"/"no" are accepted normally.
  if (micMode === 'speaker') {
    if (isSpeaking) return;
    if (Date.now() < _sttCooldownUntil && query.split(/\s+/).length < STT_SPEAKER_MIN_WORDS) return;
  }
  beepConfirm();
  if (kbdOpen) {
    textInput.value = (textInput.value + ' ' + query).trim();
  } else {
    submit(query);
  }
}

function onSttStop() {
  isListening = false;
  micBtn.classList.remove('listening');
  micIcon.textContent = MIC_MODE_LABELS[micMode];  // restore current mode label
  if (!isStreaming) {
    setStatus('STANDBY', false);
    if (!kbdOpen) voicePreview.textContent = 'TAP MIC TO SPEAK';
  }
}

// ── Provider: Web Speech API ──────────────────────────────────
const _ws = (() => {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return null;

  const rec = new SpeechRecognition();
  rec.continuous      = false;
  rec.interimResults  = true;
  rec.lang            = DG_LANGUAGE;
  rec.maxAlternatives = 1;

  let pendingTranscript = '';
  let didSubmit = false;

  rec.onstart = () => onSttStart();

  rec.onresult = (event) => {
    let interim = '', final = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const t = event.results[i][0].transcript;
      if (event.results[i].isFinal) final += t; else interim += t;
    }
    const heard = (final || interim).trim();
    if (heard) pendingTranscript = heard;
    onSttPartial(heard);
    if (final) { didSubmit = true; pendingTranscript = ''; onSttFinal(final); }
  };

  rec.onerror = (e) => {
    if (e.error !== 'no-speech') flashError('mic: ' + e.error);
    onSttStop();
  };

  rec.onend = () => {
    if (!didSubmit && pendingTranscript && !kbdOpen && !isStreaming) {
      didSubmit = true;
      onSttFinal(pendingTranscript);
    }
    pendingTranscript = '';
    didSubmit = false;
    onSttStop();
  };

  return {
    start() { try { rec.start(); } catch (e) { flashError('mic: ' + e.message.slice(0, 30)); } },
    stop()  { try { rec.stop();  } catch (_) {} },
  };
})();

// ── Provider: Deepgram (browser WebSocket + AudioWorklet PCM) ─
const _dg = (() => {
  let dgKey    = null;   // fetched once from /api/stt-token
  let dgWs     = null;
  let audioCtxDg = null;
  let workletNode = null;
  let mediaStream = null;
  let active   = false;

  // Inline AudioWorklet processor as a Blob URL — sends 256-sample PCM chunks
  const WORKLET_CODE = `
class PcmCapture extends AudioWorkletProcessor {
  process(inputs) {
    const ch = inputs[0][0];
    if (ch) this.port.postMessage(ch.buffer, [ch.buffer]);
    return true;
  }
}
registerProcessor('pcm-capture', PcmCapture);`;

  async function startDg() {
    active = true;
    onSttStart();
    try {

      // Get mic + AudioContext first so we know the real sample rate before connecting
      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      } catch (e) {
        flashError('mic denied: ' + e.message.slice(0, 30));
        active = false; onSttStop(); return;
      }
      audioCtxDg = new AudioContext();
      const actualRate = audioCtxDg.sampleRate;

      // Route through server proxy — Deepgram requires Authorization header
      // which browsers can't set on WebSocket; proxy injects it server-side.
      const params = new URLSearchParams({
        model:              DG_MODEL,
        encoding:           DG_ENCODING,
        sample_rate:        actualRate,
        language:           DG_LANGUAGE,
        interim_results:    DG_INTERIM_RESULTS,
        punctuate:          DG_PUNCTUATE,
        endpointing:        DG_EOT_TIMEOUT_MS,
        utterance_end_ms:   DG_UTTERANCE_END_MS,
        vad_events:         true,
        token:              _apiKey,
      });
      const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      dgWs = new WebSocket(`${wsProto}//${location.host}/api/stt-proxy?${params}`);
      dgWs.binaryType = 'arraybuffer';
      dgWs.onopen = async () => {
        const source = audioCtxDg.createMediaStreamSource(mediaStream);

        // Try AudioWorklet first; fall back to ScriptProcessorNode for iOS Safari
        let usedWorklet = false;
        try {
          const blob    = new Blob([WORKLET_CODE], { type: 'application/javascript' });
          const blobUrl = URL.createObjectURL(blob);
          await audioCtxDg.audioWorklet.addModule(blobUrl);
          URL.revokeObjectURL(blobUrl);
          workletNode = new AudioWorkletNode(audioCtxDg, 'pcm-capture');
          workletNode.port.onmessage = (e) => sendPcm(new Float32Array(e.data));
          source.connect(workletNode);
          usedWorklet = true;
        } catch (_) {}
        if (!usedWorklet) {
          // ScriptProcessorNode fallback for browsers without AudioWorklet support
          const spn = audioCtxDg.createScriptProcessor(4096, 1, 1);
          spn.onaudioprocess = (ev) => sendPcm(ev.inputBuffer.getChannelData(0));
          source.connect(spn);
          spn.connect(audioCtxDg.destination); // required to keep spn alive (silent output)
          workletNode = spn;
        }
        // After all async setup, resume if iOS suspended the context.
        // Called here (inside onopen callback) rather than before WS creation
        // to avoid hanging the initial fresh-page-load gesture chain.
        if (audioCtxDg && audioCtxDg.state === 'suspended') {
          audioCtxDg.resume().catch(() => {});
        }
      };

      function sendPcm(f32) {
        if (!dgWs || dgWs.readyState !== WebSocket.OPEN) return;
        const i16 = new Int16Array(f32.length);
        for (let i = 0; i < f32.length; i++)
          i16[i] = Math.max(-32768, Math.min(32767, f32[i] * 32768));
        dgWs.send(i16.buffer);
      }

      let pendingFinal = '';  // accumulate is_final segments until UtteranceEnd
      let speechFinalTimer = null;  // debounce timer for speech_final bursts
      const SPEECH_FINAL_DEBOUNCE_MS = 700;  // wait this long after last speech_final before submitting

      function flushPendingFinal() {
        if (speechFinalTimer) { clearTimeout(speechFinalTimer); speechFinalTimer = null; }
        const text = pendingFinal.trim();
        pendingFinal = '';
        if (text) { onSttPartial(text); onSttFinal(text); }
      }

      dgWs.onmessage = (e) => {
        let msg;
        try { msg = JSON.parse(e.data); } catch (_) { return; }
        if (msg.type === 'Metadata') return;
        if (msg.type === 'UtteranceEnd') {
          // utterance_end_ms fired — submit whatever we've accumulated
          flushPendingFinal();
          return;
        }
        if (msg.type !== 'Results') return;
        const alt = msg.channel?.alternatives?.[0];
        if (!alt) return;
        const transcript = (alt.transcript || '').trim();
        if (!msg.is_final) {
          if (transcript) onSttPartial(transcript);
        } else {
          // is_final segment — drop low-confidence results (bystander/ambient speech)
          if (transcript && (alt.confidence ?? 1) < DG_EOT_THRESHOLD) return;
          if (transcript) pendingFinal += (pendingFinal ? ' ' : '') + transcript;
          if (msg.speech_final && pendingFinal) {
            // Debounce: reset timer on each speech_final so rapid mid-sentence
            // pauses don't fire separate submits. UtteranceEnd will flush too.
            if (speechFinalTimer) clearTimeout(speechFinalTimer);
            speechFinalTimer = setTimeout(flushPendingFinal, SPEECH_FINAL_DEBOUNCE_MS);
          }
        }
      };
      dgWs.onerror = (ev) => { flashError('DG WS error'); stopDg(); };
      dgWs.onclose = (ev) => {
        flashError('DG closed ' + ev.code);
        if (active) { active = false; stopDg(); }
      };
    } catch (err) {
      flashError('DG catch: ' + String(err).slice(0, 40));
      active = false;
      onSttStop();
    }
  }

  function stopDg() {
    active = false;
    if (workletNode){ try { workletNode.disconnect(); } catch (_) {} workletNode = null; }
    if (mediaStream){ mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
    if (audioCtxDg) { try { audioCtxDg.close(); }  catch (_) {} audioCtxDg = null; }
    if (dgWs) {
      try {
        if (dgWs.readyState === WebSocket.OPEN) dgWs.send(JSON.stringify({ type: 'CloseStream' }));
        dgWs.close();
      } catch (_) {}
      dgWs = null;
    }
    onSttStop();
  }

  return { start: startDg, stop: stopDg };
})();

// ── STT provider map & mic button wiring ─────────────────────
const sttProviders = { webspeech: _ws, deepgram: _dg };

// STT provider toggle button (reuse same pattern as TTS)
const sttProviderBtn = document.getElementById('stt-provider-btn');
(function() {
  function updateSttBtn() {
    sttProviderBtn.textContent = STT_PROVIDER.toUpperCase();
  }
  const order = Object.keys(sttProviders).filter(k => sttProviders[k]);
  updateSttBtn();
  sttProviderBtn.addEventListener('click', () => {
    if (isListening) return;   // don't switch mid-listen
    const idx = order.indexOf(STT_PROVIDER);
    STT_PROVIDER = order[(idx + 1) % order.length];
    updateSttBtn();
  });
})();

// ── Mic button ───────────────────────────────────────────────
if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
  micBtn.classList.add('unsupported');
  micBtn.title = 'Voice requires HTTPS';
  voicePreview.textContent = 'HTTPS REQUIRED FOR MIC';
} else {
  micBtn.addEventListener('click', () => {
    if (micBtn.classList.contains('unsupported')) return;
    resetIdleTimer();
    initAudioCtx();  // re-unlock AudioContext after iOS audio interruption
    const provider = sttProviders[STT_PROVIDER];
    if (!provider) { flashError('STT provider unavailable'); return; }

    // If already in an active mode but STT dropped (e.g. iOS notification interruption,
    // or tapped while audio was playing), restart STT without cycling mode.
    if (micMode !== 'off' && !isListening && !isStreaming) {
      voiceMode = true;
      provider.start();
      return;
    }

    // Otherwise cycle: off → barge → speaker → off
    // Don't cycle while actively streaming LLM response (isStreaming).
    if (isStreaming) return;
    const next = MIC_MODES[(MIC_MODES.indexOf(micMode) + 1) % MIC_MODES.length];
    setMicMode(next);
    if (next === 'off') {
      voiceMode = false;
      if (isListening) provider.stop();
    } else {
      voiceMode = true;
      if (!isListening) provider.start();
    }
  });
  // Mark unsupported if webspeech default and not available
  if (STT_PROVIDER === 'webspeech' && !_ws) {
    micBtn.classList.add('unsupported');
    micBtn.title = 'Voice input not supported in this browser — switch to Deepgram';
  }
}

// (iOS background/foreground recovery handled by mic-reconnect-overlay below)

// ── Initial state ─────────────────────────────────────────────
showIdle(true);
showLoader(false);
setStatus('STANDBY', false);
resetIdleTimer();   // start idle countdown immediately on page load
// Do NOT focus the text input on load — prevents iOS keyboard from popping up
</script>

<script>
// ── iOS background recovery: auto-reload ─────────────────────
// iOS kills the hardware mic when Safari backgrounds. In-page getUserMedia
// recovery always returns a silent ghost track. Reload is the only reliable fix.
// We save UI state to sessionStorage so it can be restored after reload.
(function() {
  const RELOAD_KEY = 'sam_reload_state';

  // On page load: if we reloaded due to backgrounding, restore state + start STT.
  const savedJson = sessionStorage.getItem(RELOAD_KEY);
  if (savedJson) {
    sessionStorage.removeItem(RELOAD_KEY);
    try {
      const saved = JSON.parse(savedJson);
      // Delay to let page fully initialise, then restore state.
      setTimeout(() => {
        // Restore TTS provider — click the button until we reach the saved provider
        if (saved.ttsProvider && ttsProviders[saved.ttsProvider] && saved.ttsProvider !== TTS_PROVIDER) {
          const order = Object.keys(ttsProviders);
          const steps = (order.indexOf(saved.ttsProvider) - order.indexOf(TTS_PROVIDER) + order.length) % order.length;
          for (let i = 0; i < steps; i++) voiceProviderBtn.click();
        }
        // Restore fullVoiceMode
        if (saved.fullVoiceMode && !fullVoiceMode) {
          fullVoiceBtn.click();  // toggles fullVoiceMode + updates button
        }
        // Restore mic mode + start STT (extra delay so async TTS init settles first)
        const provider = sttProviders[STT_PROVIDER];
        if (provider && !micBtn.classList.contains('unsupported') && saved.micMode && saved.micMode !== 'off') {
          setMicMode(saved.micMode);
          setTimeout(() => {
            voiceMode = true;
            provider.start();
          }, 400);
        }
      }, 800);
    } catch (_) {}
  }

  // On return from background with mic active: save state and reload.
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState !== 'visible') return;
    initAudioCtx();  // always resume TTS AudioContext
    if (micMode === 'off' || isStreaming) return;
    // Save current state so it's restored after reload.
    sessionStorage.setItem(RELOAD_KEY, JSON.stringify({
      micMode,
      ttsProvider: TTS_PROVIDER,
      fullVoiceMode,
    }));
    location.reload();
  });
})();
</script>
