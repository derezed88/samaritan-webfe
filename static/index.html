<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SAMARITAN</title>
  <style>
    /* ─── Google Fonts fallback (closest free mono to FF Magda Clean Mono) ─── */
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Nova+Mono&display=swap');

    /* ─── Reset & base ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #ffffff;
      --bg-edge:    #b0b0b0;
      --bg-mid:     #d8d8d8;
      --text:       #000000;
      --red:        #fe2d2d;
      --red-dark:   #330000;
      --red-mid:    #cc0000;
      --bar:        #000000;
      --bar-text:   #ffffff;
      --font: 'Share Tech Mono', 'Nova Mono', 'Courier New', monospace;
    }

    /* ─── Dark mode theme (toggled by #screen_mode dark) ─── */
    /* NOTE: transition duration below must match THEME_TRANSITION_MS in JS */
    [data-theme="dark"] {
      --bg:         #000000;
      --bg-edge:    #1a1a1a;
      --bg-mid:     #0d0d0d;
      --text:       #ffffff;
      --bar:        #111111;
      --bar-text:   #ffffff;
      /* red accents unchanged in dark mode */
    }

    /* ─── Theme transition — applied to all elements using CSS vars ─── */
    body,
    .sidebar, .sidebar-line, .sidebar-block, .sidebar-dot, .sidebar-small-text,
    #status-bar, #control-bar,
    #word-display, #word-rule,
    #response-panel,
    #text-input, #text-input-panel,
    #kbd-btn, #mic-btn, #send-btn,
    #error-flash {
      transition:
        background-color 1s ease,
        background 1s ease,
        color 1s ease,
        border-color 1s ease,
        opacity 1s ease;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: radial-gradient(ellipse at center,
        var(--bg) 0%,
        var(--bg-mid) 55%,
        var(--bg-edge) 100%
      );
      font-family: var(--font);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: none; /* Samaritan hides the cursor */
    }

    /* ─── Scanline overlay ─── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.03) 3px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* ─── Three-column layout ─── */
    #layout {
      display: flex;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0; left: 0;
    }

    .sidebar {
      width: 17.5%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 40px;
      gap: 18px;
      opacity: 0.35;
    }

    .sidebar-line {
      width: 60%;
      height: 1px;
      background: var(--text);
    }

    .sidebar-block {
      width: 60%;
      height: 6px;
      background: var(--text);
    }

    .sidebar-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text);
    }

    .sidebar-small-text {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text);
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
    }

    /* ─── Center stage ─── */
    #center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* ─── Status bar (top) ─── */
    #status-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      background: var(--bar);
      color: var(--bar-text);
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      padding: 6px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--red);
      animation: blink-dot 1200ms ease-in-out infinite;
    }

    @keyframes blink-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.1; }
    }

    /* ─── Main display area ─── */
    #display {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 160px;
      width: 100%;
      position: relative;
    }

    /* ─── Red triangle marker ─── */
    #triangle {
      width: 0;
      height: 0;
      border-left: 12px solid transparent;
      border-right: 12px solid transparent;
      border-top: 20px solid var(--red);
      margin-bottom: 20px;
      animation: triangle-pulse 1000ms ease-in-out infinite alternate;
    }

    @keyframes triangle-pulse {
      from { border-top-color: var(--red-dark); }
      to   { border-top-color: var(--red); }
    }

    /* ─── Word display ─── */
    #word-display {
      font-size: 2.4em;
      font-weight: bold;
      letter-spacing: 8px;
      text-transform: uppercase;
      text-align: center;
      color: var(--text);
      min-height: 1.4em;
      opacity: 0;
      transition: opacity 180ms ease-in-out;
      user-select: none;
      padding: 0 20px;
      max-width: 80%;
      word-break: break-all;
    }

    #word-display.visible {
      opacity: 1;
    }

    /* ─── Horizontal rule below word ─── */
    #word-rule {
      height: 2px;
      background: var(--text);
      margin-top: 14px;
      width: 0;
      transition: width 200ms ease-out;
    }

    /* ─── Terminal panel (long responses) ─── */
    #terminal-panel {
      display: none;
      position: absolute;
      top: 30px;      /* below status bar */
      bottom: 204px;  /* above bottom-zone (160px) + control bar (44px) */
      left: 0; right: 0;
      padding: 18px 24px;
      overflow-y: auto;
      font-size: 0.88em;
      letter-spacing: 2px;
      line-height: 1.8;
      color: var(--text);
      text-align: left;
      text-transform: uppercase;
      scrollbar-width: thin;
      scrollbar-color: var(--red-mid) transparent;
      white-space: pre-wrap;
      word-break: break-word;
      z-index: 10;   /* above #display triangle/word-display */
    }

    #terminal-panel.active { display: block; }

    #terminal-panel::-webkit-scrollbar { width: 4px; }
    #terminal-panel::-webkit-scrollbar-thumb { background: var(--red-mid); }
    #terminal-panel::-webkit-scrollbar-track { background: transparent; }

    /* blinking cursor at end of terminal output */
    #terminal-cursor {
      display: inline-block;
      width: 8px;
      height: 1em;
      background: var(--red);
      vertical-align: text-bottom;
      animation: blink-cursor 600ms step-end infinite;
    }

    @keyframes blink-cursor {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ─── Idle message ─── */
    #idle {
      font-size: 1.1em;
      letter-spacing: 6px;
      color: #000000;
      background: #ffffff;
      border: 2px solid #ffffff;
      padding: 4px 14px 5px;
      display: inline-block;
    }

    [data-theme="dark"] #idle {
      color: #ffffff;
      background: #000000;
      border: 2px solid #ffffff;
    }

    #idle.blink {
      animation: blink-idle 900ms step-end infinite;
    }

    @keyframes blink-idle {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ═══════════════════════════════════════════════════════════
       KEYWORD CARDS — stacked on right side of center column
       ═══════════════════════════════════════════════════════════ */

    /* Container that holds up to 3 visible cards */
    #card-stack {
      position: absolute;
      top: 36px;
      right: 8px;
      width: 220px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 20;
      pointer-events: none;
    }

    /* Base card shell */
    .kw-card {
      font-family: 'Barlow Semi Condensed', var(--font);
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      display: none;       /* hidden cards take no space */
      opacity: 0;
      transform: translateX(30px);
      width: 100%;
    }

    /* shown = in DOM and animating in */
    .kw-card.shown {
      display: block;
      transition: opacity 400ms ease, transform 400ms ease;
    }

    .kw-card.visible {
      opacity: 1;
      transform: translateX(0);
    }

    /* ── INITIATIVE card (Dominant Mandate style) ── */
    .kw-initiative {
      background: #000000;
      border: 2px solid #ffffff;
      padding: 0 0 4px 0;
      color: #ffffff;
    }

    .kw-initiative .kw-title-bar {
      background: #717171;
      color: #000000;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 6px;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
      letter-spacing: 2px;
    }

    .kw-initiative .kw-label-row {
      display: flex;
      align-items: center;
      padding: 5px 6px 2px;
      gap: 6px;
    }

    .kw-initiative .kw-keyword-badge {
      background: #cc0000;
      color: #ffffff;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      white-space: nowrap;
    }

    .kw-initiative .kw-body {
      color: #ffffff;
      font-size: 11px;
      padding: 4px 8px 4px;
      line-height: 1.6;
      min-height: 1.4em;
    }

    .kw-initiative .kw-footer-bar {
      background: #555555;
      height: 5px;
      margin: 4px -0px 0;
    }

    /* ── ASSET card (Subject Identified style) ── */
    .kw-asset {
      color: #ffffff;
    }

    .kw-asset .kw-title-bar {
      background: #000000;
      color: #ffffff;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 6px;
      text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
      letter-spacing: 2px;
      display: inline-block;
      width: 100%;
    }

    .kw-asset .kw-subtitle-row {
      background: #606060;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 6px;
      border-top: 2px solid #aaa;
    }

    .kw-asset .kw-subtitle-label {
      color: #ffffff;
      font-size: 10px;
      text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
    }

    .kw-asset .kw-keyword-badge {
      background: #cc0000;
      color: #ffffff;
      font-size: 10px;
      padding: 1px 5px;
      text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
    }

    .kw-asset .kw-content {
      background: #000000;
      border-bottom: 2px solid #aaa;
      padding: 5px 8px;
      color: #ffffff;
      font-size: 11px;
      line-height: 1.6;
      min-height: 1.4em;
    }

    /* ── TASK card (Subtitle-Task style) ── */
    .kw-task {
      color: #ffffff;
    }

    .kw-task .kw-title-bar {
      background: #000000;
      color: #ffffff;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 6px;
      text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
      letter-spacing: 2px;
      display: inline-block;
      width: 100%;
    }

    .kw-task .kw-subtitle-row {
      background: #606060;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 6px;
      border-top: 2px solid #aaa;
    }

    .kw-task .kw-subtitle-label {
      color: #ffffff;
      font-size: 10px;
      text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
    }

    .kw-task .kw-keyword-badge {
      background: #000000;
      color: rgba(255,0,0,0.9);
      font-size: 10px;
      padding: 1px 5px;
      text-shadow: 1px 1px 2px rgba(255,0,0,0.8);
    }

    .kw-task .kw-content {
      background: #000000;
      border-bottom: 2px solid #aaa;
      padding: 5px 8px;
      color: rgba(255,0,0,0.9);
      font-size: 11px;
      line-height: 1.6;
      min-height: 1.4em;
      text-shadow: 0 0 6px rgba(255,0,0,0.5);
    }

    /* ── THREAT card (Primary Threat style) ── */
    .kw-threat {
      background: #606060;
      padding: 0;
    }

    .kw-threat .kw-deviant-bar {
      background: #232323;
      color: #ffffff;
      font-size: 9px;
      padding: 2px 6px;
      letter-spacing: 3px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .kw-threat .kw-deviant-icon {
      width: 8px; height: 8px;
      background: #cc0000;
      border-radius: 50%;
      animation: threat-pulse 800ms ease-in-out infinite alternate;
      flex-shrink: 0;
    }

    @keyframes threat-pulse {
      from { background: #b40000; box-shadow: none; }
      to   { background: #ff0000; box-shadow: 0 0 6px rgba(255,0,0,0.8); }
    }

    .kw-threat .kw-title-bar {
      background: #cc0000;
      color: #ffffff;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 6px;
      text-align: center;
      text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
      letter-spacing: 3px;
      width: 100%;
    }

    .kw-threat .kw-rows {
      padding: 4px 6px 6px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .kw-threat .kw-row {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 22px;
      border: 2px solid #787878;
    }

    .kw-threat .kw-row-label {
      color: #ffffff;
      font-size: 9px;
      padding: 0 5px;
      flex-shrink: 0;
      width: 70px;
    }

    .kw-threat .kw-row-value {
      background: #cc0000;
      color: #ffffff;
      font-size: 9px;
      padding: 0 6px;
      flex: 1;
      height: 100%;
      display: flex;
      align-items: center;
      letter-spacing: 2px;
    }

    .kw-threat .kw-content {
      padding: 4px 8px 5px;
      color: #ffffff;
      font-size: 10px;
      line-height: 1.6;
      min-height: 1.2em;
      border-top: 1px solid rgba(180,180,180,0.3);
    }

    /* ─── Loader dots ─── */
    #loader {
      display: none;
      gap: 6px;
      align-items: center;
      margin-top: 8px;
    }

    #loader.active { display: flex; }

    .loader-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text);
      animation: loader-wave 1.2s ease-in-out infinite;
    }

    .loader-dot:nth-child(1) { animation-delay: 0ms; }
    .loader-dot:nth-child(2) { animation-delay: 120ms; }
    .loader-dot:nth-child(3) { animation-delay: 240ms; }
    .loader-dot:nth-child(4) { animation-delay: 360ms; }
    .loader-dot:nth-child(5) { animation-delay: 480ms; }
    .loader-dot:nth-child(6) { animation-delay: 600ms; }
    .loader-dot:nth-child(7) { animation-delay: 720ms; }

    @keyframes loader-wave {
      0%, 100% { transform: scaleY(1);   opacity: 0.3; }
      50%       { transform: scaleY(2.2); opacity: 1; }
    }

    /* ─── Bottom zone: shared by response panel and text input panel ─── */
    /* Both panels sit above the control bar, occupying the same space.   */
    /* Only one is visible at a time.                                      */

    #bottom-zone {
      position: absolute;
      bottom: 44px;   /* height of control bar */
      left: 0; right: 0;
      height: 160px;
      display: flex;
      align-items: stretch;
      z-index: 30;   /* above #card-stack (z-index:20) */
    }

    /* ─── Response panel ─── */
    #response-panel {
      display: none;
      position: absolute;
      top: 30px;      /* below status bar */
      bottom: 204px;  /* above bottom-zone + control bar */
      left: 0; right: 0;
      padding: 18px 24px;
      overflow-y: auto;
      font-size: 0.82em;
      letter-spacing: 2px;
      text-transform: uppercase;
      line-height: 1.8;
      color: var(--text);
      opacity: 0.55;
      text-align: left;
      scrollbar-width: none;
      white-space: pre-wrap;
      word-break: break-word;
      z-index: 9;   /* below terminal-panel (z-index:10) */
    }

    #response-panel.active { display: block; }
    #response-panel::-webkit-scrollbar { display: none; }

    /* ─── Text input panel (full-width, same zone) ─── */
    #text-input-panel {
      display: none;   /* shown only in kbd mode */
      flex: 1;
      flex-direction: column;
      align-items: stretch;
      padding: 16px 20px 10px;
      background: var(--bg);
      border-top: 1px solid rgba(128,128,128,0.4);
    }

    #text-input-panel.open {
      display: flex;
    }

    #text-input-label {
      color: var(--red);
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    #text-input {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 2px solid var(--red-mid);
      color: var(--text);
      font-family: var(--font);
      font-size: 1.5em;
      letter-spacing: 4px;
      text-transform: uppercase;
      outline: none;
      padding: 4px 0;
      caret-color: var(--red);
      width: 100%;
    }

    #text-input::placeholder {
      color: var(--text);
      opacity: 0.2;
      letter-spacing: 3px;
    }

    #send-btn {
      align-self: flex-end;
      margin-top: 10px;
      background: transparent;
      border: 1px solid var(--red-mid);
      color: var(--red-mid);
      cursor: pointer;
      padding: 6px 20px;
      font-family: var(--font);
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      transition: all 200ms;
    }

    #send-btn:hover  { background: var(--red-dark); color: #fff; border-color: var(--red); }
    #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ─── Control bar (bottom strip) ─── */
    #control-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: var(--bar);
      height: 44px;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
      z-index: 30;   /* above #card-stack (z-index:20) */
    }

    #prompt-label {
      color: var(--red);
      font-size: 16px;
      flex-shrink: 0;
    }

    /* voice transcript fills the middle */
    #voice-preview {
      flex: 1;
      font-size: 10px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-style: italic;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: center;
    }

    /* ─── Keyboard toggle button ─── */
    #kbd-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      padding: 4px 10px;
      font-family: var(--font);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      flex-shrink: 0;
      transition: all 200ms;
      height: 28px;
    }

    #kbd-btn:hover, #kbd-btn.active {
      border-color: var(--red-mid);
      color: var(--bar-text);
    }

    /* ─── Mic button ─── */
    #mic-btn {
      background: transparent;
      border: 1px solid var(--red-mid);
      color: var(--bar-text);
      cursor: pointer;
      padding: 4px 10px;
      font-family: var(--font);
      font-size: 13px;
      transition: all 200ms;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      height: 32px;
    }

    #mic-btn:hover { background: var(--red-dark); border-color: var(--red); }

    #mic-btn.listening {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
      animation: mic-pulse 600ms ease-in-out infinite alternate;
    }

    @keyframes mic-pulse {
      from { box-shadow: 0 0 4px var(--red); }
      to   { box-shadow: 0 0 20px var(--red), 0 0 40px rgba(254,45,45,0.3); }
    }

    #mic-icon { font-size: 15px; }
    #mic-btn.unsupported { opacity: 0.3; cursor: not-allowed; }

    /* ─── Voice provider selector ─── */
    #stt-provider-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      padding: 4px 10px;
      font-family: var(--font);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      flex-shrink: 0;
      transition: all 200ms;
      height: 28px;
    }
    #stt-provider-btn:hover {
      border-color: rgba(255,255,255,0.5);
      color: var(--bar-text);
    }

    #voice-provider-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      padding: 4px 10px;
      font-family: var(--font);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      flex-shrink: 0;
      transition: all 200ms;
      height: 28px;
    }
    #voice-provider-btn:hover {
      border-color: rgba(255,255,255,0.5);
      color: var(--bar-text);
    }

    /* ─── Full-voice toggle button ─── */
    #full-voice-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      padding: 4px 10px;
      font-family: var(--font);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      flex-shrink: 0;
      transition: all 200ms;
      height: 28px;
    }

    #full-voice-btn:hover {
      border-color: var(--red-mid);
      color: var(--bar-text);
    }

    #full-voice-btn.active {
      border-color: var(--red);
      color: var(--red);
      animation: fv-pulse 1.2s ease-in-out infinite alternate;
    }

    @keyframes fv-pulse {
      from { box-shadow: 0 0 2px var(--red); }
      to   { box-shadow: 0 0 12px var(--red), 0 0 24px rgba(254,45,45,0.25); }
    }

    /* ─── Speaker icon waves: hidden until full-voice active ─── */
    #fv-wave1, #fv-wave2 { opacity: 0; transition: opacity 200ms; }
    #full-voice-btn.active #fv-wave1 { opacity: 1; }
    #full-voice-btn.active #fv-wave2 { opacity: 1; }

    /* ─── Keyboard SVG key dots ─── */
    #kbd-btn svg line { stroke-width: 3; stroke-linecap: round; }

    /* ─── Corner decorations ─── */
    .corner {
      position: absolute;
      width: 20px;
      height: 20px;
      opacity: 0.4;
    }

    .corner-tl { top: 40px; left: 0; border-top: 2px solid var(--text); border-left: 2px solid var(--text); }
    .corner-tr { top: 40px; right: 0; border-top: 2px solid var(--text); border-right: 2px solid var(--text); }
    .corner-bl { bottom: 48px; left: 0; border-bottom: 2px solid var(--text); border-left: 2px solid var(--text); }
    .corner-br { bottom: 48px; right: 0; border-bottom: 2px solid var(--text); border-right: 2px solid var(--text); }

    /* ─── Error flash ─── */
    #error-flash {
      position: absolute;
      top: 50px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--red);
      opacity: 0;
      transition: opacity 300ms;
      pointer-events: none;
      white-space: nowrap;
    }

    #error-flash.show { opacity: 1; }

    /* ─── Session ID (top right sidebar) ─── */
    #session-id {
      position: absolute;
      top: 10px;
      right: 20px;
      font-size: 9px;
      letter-spacing: 2px;
      color: rgba(0,0,0,0.3);
      text-transform: uppercase;
    }

    /* ─── Voice transcript preview ─── */
    #voice-preview {
      font-size: 10px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 2px;
      text-transform: uppercase;
      flex-shrink: 1;
      font-style: italic;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      text-align: center;
    }

    /* ─── Keyboard toggle button ─── */
    #kbd-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      padding: 5px 10px;
      font-family: var(--font);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      flex-shrink: 0;
      transition: all 200ms;
    }

    #kbd-btn:hover, #kbd-btn.active {
      border-color: var(--red-mid);
      color: var(--bar-text);
    }


    /* ─── Send button ─── */
    #send-btn {
      background: transparent;
      border: 1px solid var(--red-mid);
      color: var(--red);
      cursor: pointer;
      padding: 5px 14px;
      font-family: var(--font);
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      transition: all 200ms;
      flex-shrink: 0;
    }

    #send-btn:hover {
      background: var(--red-dark);
      color: #fff;
      border-color: var(--red);
    }

    #send-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
  </style>
</head>

<script>
// ═══════════════════════════════════════════════════════════
//  SAMARITAN INTERFACE — client logic
// ═══════════════════════════════════════════════════════════
// ── Auth ─────────────────────────────────────────────────────
// HTTP Basic Auth is handled by the browser — it prompts for credentials
// Key is injected by the server at render time — sent as Bearer on all requests.
// EventSource can't set headers so it uses ?token= query param instead.
const _apiKey = '%%SAMARITAN_API_KEY%%';
function authHeaders() {
  return _apiKey ? { 'Authorization': 'Bearer ' + _apiKey } : {};
}
function authedUrl(url) {
  if (!_apiKey) return url;
  const sep = url.includes('?') ? '&' : '?';
  return url + sep + 'token=' + encodeURIComponent(_apiKey);
}

// ── Session ID (unique per submit) ──────────────────────────
function makeSessionId() { return 'sam-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
let SESSION_ID = makeSessionId();
document.getElementById('session-id-value').textContent = SESSION_ID.toUpperCase();

// ── DOM refs ────────────────────────────────────────────────
const wordDisplay    = document.getElementById('word-display');
const wordRule       = document.getElementById('word-rule');
const idleEl         = document.getElementById('idle');
const loaderEl       = document.getElementById('loader');
const terminalPanel  = document.getElementById('terminal-panel');
const terminalText   = document.getElementById('terminal-text');
const terminalCursor = document.getElementById('terminal-cursor');
const cardStack      = document.getElementById('card-stack');
const textInput      = document.getElementById('text-input');
const textInputPanel = document.getElementById('text-input-panel');
const sendBtn        = document.getElementById('send-btn');
const micBtn         = document.getElementById('mic-btn');
const micIcon        = document.getElementById('mic-icon');
const kbdBtn         = document.getElementById('kbd-btn');
const fullVoiceBtn       = document.getElementById('full-voice-btn');
const voiceProviderBtn   = document.getElementById('voice-provider-btn');
const voicePreview   = document.getElementById('voice-preview');
const statusText     = document.getElementById('status-text');
const statusDot      = document.getElementById('status-dot');
const responsePanel  = document.getElementById('response-panel');
const errorFlash     = document.getElementById('error-flash');
const clockEl        = document.getElementById('clock');

// ── Keyboard / voice mode toggle ─────────────────────────────
let kbdOpen      = false;
let voiceMode    = false;  // true only when user explicitly enabled mic
let fullVoiceMode = false; // true when xAI TTS is active

// ── Full-voice toggle ─────────────────────────────────────────
// Pre-create AudioContext on user gesture so iOS Safari allows it to play later.
function initAudioCtx() {
  if (!audioCtx || audioCtx.state === 'closed') {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

// voiceProviderBtn wired after ttsProviders is defined (see end of TTS section)

fullVoiceBtn.addEventListener('click', () => {
  fullVoiceMode = !fullVoiceMode;
  fullVoiceBtn.classList.toggle('active', fullVoiceMode);
  voicePreview.textContent = fullVoiceMode ? 'SAMARITAN VOICE ACTIVE' : 'TAP MIC TO SPEAK';
  if (fullVoiceMode) initAudioCtx();  // unlock AudioContext while we have a user gesture
});

function setKbdMode(open) {
  kbdOpen = open;
  if (open) voiceMode = false;  // entering keyboard mode disables auto-restart
  // Swap panels: show text input OR response panel, never both
  textInputPanel.classList.toggle('open', open);
  // responsePanel visibility is managed independently via .active class
  kbdBtn.classList.toggle('active', open);
  voicePreview.style.visibility = open ? 'hidden' : '';
  if (!open) {
    textInput.blur();
    voicePreview.textContent = 'TAP MIC TO SPEAK';
  }
  // Stop mic when switching to keyboard mode
  if (open && isListening) {
    sttProviders[STT_PROVIDER]?.stop();
  }
}

// iOS requires focus() to be called synchronously inside the tap handler
kbdBtn.addEventListener('click', () => {
  resetIdleTimer();
  if (fullVoiceMode) initAudioCtx();  // unlock AudioContext while we have a user gesture
  const opening = !kbdOpen;
  setKbdMode(opening);
  if (opening) {
    textInput.focus();
  }
});

// ── Clock ───────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  clockEl.textContent = now.toTimeString().slice(0, 8);
}
updateClock();
setInterval(updateClock, 1000);

// ── Config ───────────────────────────────────────────────────
const IDLE_TIMEOUT_SEC        = 300;   // seconds before screen returns to idle message
const THEME_TRANSITION_MS     = 3000;  // ms for dark/light crossfade (must match CSS transition duration)
const LONG_RESPONSE_THRESHOLD = 10;    // words — responses >= this use terminal display instead of word flash
const TERMINAL_CHAR_DELAY_MS  = 18;    // ms per character in terminal typewriter effect
const CARD_CYCLE_DELAY_MS     = 5000;  // ms each group of 3 cards is shown when cycling
let   TTS_PROVIDER            = 'inworld';              // active TTS provider: 'xai' | 'inworld'
const XAI_VOICE               = 'ara';              // xAI realtime voice: Eve | Ara | Rex | Sal | Leo
const INWORLD_VOICE           = 'Evelyn';           // Inworld voice name
const INWORLD_MODEL           = 'inworld-tts-1.5-max'; // Inworld model ID
const INWORLD_SPEAKING_RATE   = 1.3;                // 0.5–1.5× native speed
const INWORLD_TEMPERATURE     = 1.0;                // 0–2; expressiveness

// ── STT config ───────────────────────────────────────────────
let   STT_PROVIDER            = 'deepgram';        // 'webspeech' | 'deepgram'
const DG_MODEL                = 'nova-3';           // nova-3 | nova-2 | enhanced
const DG_ENCODING             = 'linear16';         // linear16 (raw PCM from AudioWorklet)
const DG_SAMPLE_RATE          = 16000;              // Hz — must match AudioContext sampleRate
const DG_EOT_TIMEOUT_MS       = 1200;               // ms silence → speech_final (end-of-turn)
const DG_EOT_THRESHOLD        = 0.95;               // endpointing confidence threshold (0–1)
const DG_LANGUAGE             = 'en-US';
const DG_INTERIM_RESULTS      = true;               // show partial transcripts in preview
const DG_PUNCTUATE            = true;

// Keyword → card-type mapping. Add/remove entries freely.
// type: 'initiative' | 'asset' | 'task' | 'threat'
const KEYWORD_CARDS = {
  'INITIATIVE:': { type: 'initiative' },
  'ASSET:':      { type: 'asset'      },
  'TASK:':       { type: 'task'       },
  'THREAT:':     { type: 'threat'     },
};

// ── State ────────────────────────────────────────────────────
let isStreaming    = false;
let isSpeaking     = false;
let wordQueue      = [];
let wordAnimating  = false;
let fullResponse   = '';
let idleTimer      = null;

// ── Utilities ────────────────────────────────────────────────
function setStatus(text, active = false) {
  statusText.textContent = text.toUpperCase();
  statusDot.style.animationPlayState = active ? 'running' : 'paused';
  statusDot.style.opacity = active ? null : '1';
}

function flashError(msg) {
  errorFlash.textContent = '[ ' + msg.toUpperCase() + ' ]';
  errorFlash.classList.add('show');
  setTimeout(() => errorFlash.classList.remove('show'), 3000);
}

// ── #command handler ─────────────────────────────────────────
// Commands starting with # are intercepted client-side and never sent to agent-mcp.
// Add new commands as cases in handleCommand().

function cmdScreenMode(mode) {
  if (mode !== 'dark' && mode !== 'light') {
    flashError('usage: #screen_mode <dark|light>');
    return;
  }
  if (mode === 'dark') {
    document.body.setAttribute('data-theme', 'dark');
  } else {
    document.body.removeAttribute('data-theme');
  }
}

function handleCommand(raw) {
  const parts = raw.trim().split(/\s+/);
  const cmd   = parts[0].toLowerCase();
  const args  = parts.slice(1);
  switch (cmd) {
    case '#screen_mode': cmdScreenMode(args[0]); break;
    default: flashError('unknown command: ' + cmd);
  }
}

// ── Keyword card engine ───────────────────────────────────────
// Scans completed response text for KEYWORD: sentences,
// builds typed cards, stacks them on the right, cycles if > 3.

let cardCycleTimer = null;

function buildCardHTML(type, keyword, body) {
  switch (type) {
    case 'initiative':
      return `<div class="kw-card kw-initiative">
        <div class="kw-title-bar">SAMARITAN</div>
        <div class="kw-label-row">
          <span class="kw-keyword-badge">${keyword}</span>
        </div>
        <div class="kw-body" data-typetext="${escAttr(body)}"></div>
        <div class="kw-footer-bar"></div>
      </div>`;

    case 'asset':
      return `<div class="kw-card kw-asset">
        <div class="kw-title-bar">SUBJECT IDENTIFIED</div>
        <div class="kw-subtitle-row">
          <span class="kw-subtitle-label">DESIGNATION:</span>
          <span class="kw-keyword-badge">ASSET</span>
        </div>
        <div class="kw-content" data-typetext="${escAttr(body)}"></div>
      </div>`;

    case 'task':
      return `<div class="kw-card kw-task">
        <div class="kw-title-bar">SAMARITAN</div>
        <div class="kw-subtitle-row">
          <span class="kw-subtitle-label">TASK:</span>
          <span class="kw-keyword-badge">DIRECTIVE</span>
        </div>
        <div class="kw-content" data-typetext="${escAttr(body)}"></div>
      </div>`;

    case 'threat':
      return `<div class="kw-card kw-threat">
        <div class="kw-deviant-bar">
          <span class="kw-deviant-icon"></span>
          <span>/// DEVIANT ///</span>
        </div>
        <div class="kw-title-bar">PRIMARY THREAT</div>
        <div class="kw-rows">
          <div class="kw-row">
            <span class="kw-row-label">PROJECTION</span>
            <span class="kw-row-value">THREAT</span>
          </div>
          <div class="kw-row">
            <span class="kw-row-label">CONCLUSION</span>
            <span class="kw-row-value">ELIMINATE</span>
          </div>
        </div>
        <div class="kw-content" data-typetext="${escAttr(body)}"></div>
      </div>`;

    default: return '';
  }
}

function escAttr(str) {
  return str.replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function typeIntoEl(el, text, charDelay, onDone) {
  let i = 0;
  el.textContent = '';
  function tick() {
    if (i < text.length) {
      el.textContent += text[i++];
      setTimeout(tick, charDelay);
    } else {
      if (onDone) onDone();
    }
  }
  tick();
}

function parseKeywordCards(text) {
  // Split the response on any recognised keyword (case-insensitive).
  // Each segment after a keyword is that keyword's body text.
  const keys = Object.keys(KEYWORD_CARDS);
  if (!keys.length) return [];

  // Build a splitter that captures the keyword token
  const splitter = new RegExp(
    '(' + keys.map(k => k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|') + ')',
    'i'
  );

  const parts = text.split(splitter);
  // parts = [pre, KW1, body1, KW2, body2, ...]
  const cards = [];
  for (let i = 1; i < parts.length - 1; i += 2) {
    const kw   = parts[i].toUpperCase().trim();
    const body = (parts[i + 1] || '').trim().replace(/\s+/g, ' ');
    if (body && KEYWORD_CARDS[kw]) {
      cards.push({ type: KEYWORD_CARDS[kw].type, keyword: kw, body });
    }
  }
  return cards;
}

function showCardGroup(cardEls, groupIdx, allGroups) {
  // Hide all cards cleanly — remove inline styles so CSS base state takes over
  cardEls.forEach(el => {
    el.classList.remove('visible');
    el.classList.remove('shown');
    el.style.transform = '';
    el.style.opacity   = '';
  });

  // Show current group: add 'shown' (display:block), force reflow, then add 'visible' to trigger transition
  const group = allGroups[groupIdx];
  group.forEach((el, i) => {
    setTimeout(() => {
      el.classList.add('shown');
      // Force reflow so browser registers the display:block before the opacity/transform transition
      void el.offsetWidth;
      el.classList.add('visible');

      // Start typewriter after card is visible
      const bodyEl = el.querySelector('[data-typetext]');
      if (bodyEl && !bodyEl._typed) {
        bodyEl._typed = true;
        typeIntoEl(bodyEl, bodyEl.getAttribute('data-typetext'), TERMINAL_CHAR_DELAY_MS, null);
      }
    }, i * 150);
  });

  // Schedule next group if cycling
  if (allGroups.length > 1) {
    cardCycleTimer = setTimeout(() => {
      const next = (groupIdx + 1) % allGroups.length;
      showCardGroup(cardEls, next, allGroups);
    }, CARD_CYCLE_DELAY_MS);
  }
}

function renderKeywordCards(cards) {
  clearTimeout(cardCycleTimer);
  cardStack.innerHTML = '';
  if (!cards.length) return;

  // Build DOM elements
  const cardEls = cards.map(c => {
    const tmp = document.createElement('div');
    tmp.innerHTML = buildCardHTML(c.type, c.keyword, c.body);
    return tmp.firstElementChild;
  });

  cardEls.forEach(el => cardStack.appendChild(el));

  // Group into sets of 3 and cycle
  const groups = [];
  for (let i = 0; i < cardEls.length; i += 3) {
    groups.push(cardEls.slice(i, i + 3));
  }
  showCardGroup(cardEls, 0, groups);
}

function clearKeywordCards() {
  clearTimeout(cardCycleTimer);
  cardStack.innerHTML = '';
}

function showIdle(show) {
  idleEl.style.display = show ? 'block' : 'none';
}

function showLoader(show) {
  loaderEl.classList.toggle('active', show);
}

// ── Terminal display (long responses) ────────────────────────
function showTerminal(show) {
  terminalPanel.classList.toggle('active', show);
  if (!show) {
    terminalText.textContent = '';
    terminalCursor.style.display = 'none';
  } else {
    terminalCursor.style.display = 'inline-block';
  }
}

let terminalAnimating = false;

function runTerminal(text, onDone) {
  terminalAnimating = true;
  terminalText.textContent = '';
  terminalCursor.style.display = 'inline-block';
  showIdle(false);
  showTerminal(true);

  // Hide the word-flash area while terminal is active
  wordDisplay.classList.remove('visible');
  wordDisplay.textContent = '';
  wordRule.style.width = '0';

  let i = 0;
  function tick() {
    if (i < text.length) {
      terminalText.textContent += text[i++];
      // Auto-scroll to bottom as text grows
      terminalPanel.scrollTop = terminalPanel.scrollHeight;
      setTimeout(tick, TERMINAL_CHAR_DELAY_MS);
    } else {
      // Finished — leave cursor blinking, call done callback
      terminalAnimating = false;
      if (onDone) onDone();
    }
  }
  tick();
}

function showIdleScreen() {
  // Only activate idle screen when nothing is happening
  if (isStreaming || wordAnimating || wordQueue.length > 0) return;
  wordDisplay.classList.remove('visible');
  wordDisplay.textContent = '';
  wordRule.style.width = '0';
  responsePanel.textContent = '';
  responsePanel.classList.remove('active');
  fullResponse = '';
  showTerminal(false);   // clear terminal when idle screen takes over
  clearKeywordCards();
  // blink removed — CONNECTION ESTABLISHED stays static
  showIdle(true);
  setStatus('STANDBY', false);
}

function resetIdleTimer() {
  clearTimeout(idleTimer);
  idleEl.classList.remove('blink');
  idleTimer = setTimeout(showIdleScreen, IDLE_TIMEOUT_SEC * 1000);
}

// ── Word-by-word animation ────────────────────────────────────
//  Samaritan shows ONE word at a time, center screen.
//  Each word fades in, holds, fades out, then next word.
const WORD_FADE   = 180;   // ms opacity transition (set in CSS)
const WORD_HOLD   = 380;   // ms visible hold per word
const WORD_GAP    = 60;    // ms between words

function flashWord(word) {
  return new Promise(resolve => {
    wordDisplay.textContent = word;
    wordRule.style.width = Math.min(word.length * 22, 600) + 'px';
    // Force reflow then fade in
    void wordDisplay.offsetWidth;
    wordDisplay.classList.add('visible');

    setTimeout(() => {
      wordDisplay.classList.remove('visible');
      setTimeout(resolve, WORD_FADE + WORD_GAP);
    }, WORD_HOLD);
  });
}

async function drainWordQueue() {
  if (wordAnimating) return;
  wordAnimating = true;
  showIdle(false);

  while (wordQueue.length > 0) {
    const word = wordQueue.shift();
    if (word.trim()) {
      await flashWord(word.trim());
    }
  }

  // After queue empty — if still streaming, wait for more
  if (isStreaming) {
    // Brief pause then check again
    await new Promise(r => setTimeout(r, 80));
    if (wordQueue.length > 0) {
      wordAnimating = false;
      drainWordQueue();
      return;
    }
  }

  wordAnimating = false;
  if (!isStreaming) {
    wordDisplay.textContent = '';
    wordRule.style.width = '0';
    // Do NOT show idle here — timer fires after IDLE_TIMEOUT_SEC
  }
}

function enqueueTokens(text) {
  // Split incoming text into words (preserving non-space chunks)
  const words = text.split(/(\s+)/).filter(w => w.trim().length > 0);
  wordQueue.push(...words);
  if (!wordAnimating) {
    drainWordQueue();
  }
}

// ── Response panel (accumulated text history) ────────────────
function appendToPanel(text) {
  fullResponse += text;
  // Don't show panel yet — revealed after animation drains or terminal takes over
}

// ── xAI Realtime Voice (TTS) ─────────────────────────────────
/// ── TTS Engine ───────────────────────────────────────────────
// Hybrid approach: agent-mcp handles all reasoning/memory/tools (SSE flow),
// then the completed response text is sent to the TTS provider for audio.
// Switch providers by changing TTS_PROVIDER in the config block above.
//
// To add a new provider, add an entry to ttsProviders below implementing:
//   speak(text, clientSecret, onDone, onError) — start streaming audio
//   stop()                                      — abort any in-progress audio

let audioCtx   = null;  // Web Audio context (created on first user gesture)
let nextPlayAt = 0;     // AudioContext time for next scheduled PCM chunk
let cachedVtok = null;  // voice token delivered via SSE (avoids extra HTTP round-trip)

// PCM16-LE base64 → AudioBuffer for Web Audio API (shared across providers)
function pcm16Base64ToFloat32(b64, sampleRate) {
  const bin   = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  const samples = bytes.length / 2;
  const buf  = audioCtx.createBuffer(1, samples, sampleRate);
  const data = buf.getChannelData(0);
  const view = new DataView(bytes.buffer);
  for (let i = 0; i < samples; i++) {
    data[i] = view.getInt16(i * 2, true) / 32768;
  }
  return buf;
}

// Schedule an AudioBuffer for gapless sequential playback (shared across providers).
// Uses a small initial lookahead (5ms) on the first chunk so audio starts promptly,
// then chains subsequent chunks directly to avoid inter-chunk gaps that cause clicks.
function scheduleAudioChunk(audioBuf) {
  if (!audioCtx) return;
  const src = audioCtx.createBufferSource();
  src.buffer = audioBuf;
  src.connect(audioCtx.destination);
  // First chunk: small lookahead to let the scheduler breathe.
  // Subsequent chunks: start exactly where the previous one ends (gapless).
  const startAt = nextPlayAt > 0
    ? nextPlayAt
    : audioCtx.currentTime + 0.005;
  src.start(startAt);
  nextPlayAt = startAt + audioBuf.duration;
}

// ── Provider registry ─────────────────────────────────────────
const ttsProviders = {

  // ── xAI Realtime API ───────────────────────────────────────
  xai: {
    _ws: null,

    speak(text, clientSecret, onDone, onError) {
      // Voice names must be capitalized per xAI docs (Eve, Ara, Rex, Sal, Leo)
      const voiceName = XAI_VOICE.charAt(0).toUpperCase() + XAI_VOICE.slice(1).toLowerCase();
      let ws;
      try {
        ws = new WebSocket('wss://api.x.ai/v1/realtime',
                           [`xai-client-secret.${clientSecret}`]);
      } catch (e) {
        onError('ws: ' + e.message.slice(0, 40));
        return;
      }
      this._ws = ws;

      ws.onopen = () => {
        ws.send(JSON.stringify({
          type: 'session.update',
          session: {
            modalities: ['audio'],
            voice: voiceName,
            output_audio_format: 'audio/pcm',
            turn_detection: null,
          },
        }));
        // "Say this: <text>" — direct command, prevents LLM paraphrasing
        ws.send(JSON.stringify({
          type: 'conversation.item.create',
          item: {
            type: 'message', role: 'user',
            content: [{ type: 'input_text', text: `Say this: ${text}` }],
          },
        }));
        ws.send(JSON.stringify({
          type: 'response.create',
          response: { modalities: ['audio'] },
        }));
      };

      ws.onmessage = (evt) => {
        let msg;
        try { msg = JSON.parse(evt.data); } catch (_) { return; }
        switch (msg.type) {
          case 'response.output_audio.delta':
            if (msg.delta) {
              try { scheduleAudioChunk(pcm16Base64ToFloat32(msg.delta, 24000)); }
              catch (e) { onError('pcm: ' + e.message.slice(0, 25)); }
            }
            break;
          case 'response.done':
            ws.close(); this._ws = null; onDone(); break;
          case 'error':
            ws.close(); this._ws = null;
            onError((msg.error?.message || 'voice error').slice(0, 60)); break;
        }
      };

      ws.onerror = () => { this._ws = null; onError('voice ws error'); };

      ws.onclose = (evt) => {
        if (this._ws === ws) this._ws = null;
        if (evt.code !== 1000 && evt.code !== 1005) onError('voice closed: ' + evt.code);
      };
    },

    stop() {
      if (this._ws) { try { this._ws.close(); } catch(_) {} this._ws = null; }
    },
  },

  // ── Inworld TTS (HTTP streaming) ───────────────────────────
  // Server proxies to api.inworld.ai/tts/v1/voice (batch endpoint, returns MP3).
  // clientSecret arg unused — no ephemeral token exchange needed.
  // Audio: MP3, decoded by browser via decodeAudioData — no PCM parsing required.
  inworld: {
    _abortCtrl: null,

    speak(text, _clientSecret, onDone, onError) {
      this._abortCtrl = new AbortController();
      const signal = this._abortCtrl.signal;

      (async () => {
        let resp;
        try {
          resp = await fetch('/api/tts/inworld', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', ...authHeaders() },
            body: JSON.stringify({ text, voice_id: INWORLD_VOICE, model_id: INWORLD_MODEL, speaking_rate: INWORLD_SPEAKING_RATE, temperature: INWORLD_TEMPERATURE }),
            signal,
          });
        } catch (e) {
          if (e.name !== 'AbortError') onError('inworld: ' + e.message.slice(0, 30));
          return;
        }
        if (!resp.ok) { onError('inworld http ' + resp.status); return; }

        // Decode MP3 via Web Audio API — handles format/sample-rate automatically
        let arrayBuf;
        try { arrayBuf = await resp.arrayBuffer(); }
        catch (e) { onError('inworld read: ' + e.message.slice(0, 30)); return; }

        let audioBuf;
        try { audioBuf = await audioCtx.decodeAudioData(arrayBuf); }
        catch (e) { onError('inworld decode: ' + e.message.slice(0, 30)); return; }

        scheduleAudioChunk(audioBuf);
        // Wait for playback to complete then signal done
        setTimeout(onDone, audioBuf.duration * 1000 + 150);
      })();
    },

    stop() {
      if (this._abortCtrl) { this._abortCtrl.abort(); this._abortCtrl = null; }
    },
  },

};

// ── Wire voice provider button (after ttsProviders is defined) ───────────────
(function() {
  function updateVoiceProviderBtn() {
    voiceProviderBtn.textContent = 'VOICE: ' + TTS_PROVIDER.toUpperCase();
  }
  const providerOrder = Object.keys(ttsProviders);
  updateVoiceProviderBtn();
  voiceProviderBtn.addEventListener('click', () => {
    const idx = providerOrder.indexOf(TTS_PROVIDER);
    TTS_PROVIDER = providerOrder[(idx + 1) % providerOrder.length];
    updateVoiceProviderBtn();
    if (fullVoiceMode) initAudioCtx();
  });
})();

// ── speakWithSamaritan ────────────────────────────────────────
// Provider-agnostic TTS entry point. Called from the SSE 'done' handler.
async function speakWithSamaritan(responseText, wasKbd) {
  // AudioContext must be pre-unlocked by a user gesture (FULL VOICE / kbd / send tap).
  if (!audioCtx || audioCtx.state === 'closed') {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  nextPlayAt = 0;

  // Get voice token — SSE-delivered cached token first (avoids Safari post-WS HTTP drop)
  let clientSecret;
  if (cachedVtok) {
    const j = cachedVtok;
    cachedVtok = null;
    clientSecret = j.client_secret?.value || j.value || j.token;
  }
  if (!clientSecret) {
    try {
      const r = await fetch('/api/voice-token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', ...authHeaders() },
        body: JSON.stringify({ expires_in: 120 }),
      });
      if (r.ok) {
        const j = await r.json();
        clientSecret = j.client_secret?.value || j.value || j.token;
      } else {
        flashError('vtok http ' + r.status);
      }
    } catch (e) { flashError('vtok fetch: ' + e.message.slice(0, 25)); }
  }
  if (!clientSecret) {
    flashError('voice token failed');
    waitForDrainThenListen(wasKbd);
    return;
  }

  setStatus('SAMARITAN SPEAKING', true);
  voicePreview.textContent = fullVoiceMode ? 'SAMARITAN SPEAKING…' : 'TAP MIC TO SPEAK';

  const provider = ttsProviders[TTS_PROVIDER];
  if (!provider) {
    flashError('unknown tts provider: ' + TTS_PROVIDER);
    waitForDrainThenListen(wasKbd);
    return;
  }

  isSpeaking = true;
  provider.speak(
    responseText,
    clientSecret,
    () => { isSpeaking = false; waitForDrainThenListen(wasKbd); },   // onDone
    (err) => {                                                         // onError
      isSpeaking = false;
      flashError(err);
      voicePreview.textContent = fullVoiceMode ? 'SAMARITAN VOICE ACTIVE' : 'TAP MIC TO SPEAK';
      waitForDrainThenListen(wasKbd);
    },
  );
}

// ── Submit ───────────────────────────────────────────────────
async function submit(textOverride) {
  const text = (textOverride || textInput.value).trim();
  if (!text || isStreaming) return;

  // Intercept #commands — handle locally, never forward to agent-mcp
  if (text.startsWith('#')) {
    textInput.value = '';
    if (kbdOpen) setTimeout(() => textInput.focus(), 50);
    handleCommand(text);
    return;
  }

  resetIdleTimer();   // user is active — reset idle countdown
  SESSION_ID = makeSessionId();   // fresh session per submit — avoids stale agent-mcp streams
  document.getElementById('session-id-value').textContent = SESSION_ID.toUpperCase();
  const wasKbd = kbdOpen;
  textInput.value = '';
  textInput.blur();          // dismiss iOS keyboard immediately
  if (kbdOpen) setKbdMode(false);  // switch to response panel while waiting
  voicePreview.textContent = fullVoiceMode ? 'SAMARITAN VOICE ACTIVE' : 'TAP MIC TO SPEAK';
  isStreaming = true;
  wordQueue   = [];
  fullResponse = '';
  responsePanel.textContent = '';
  responsePanel.classList.remove('active');
  showTerminal(false);   // clear any previous long response
  clearKeywordCards();   // clear any previous keyword cards

  setStatus('PROCESSING', true);
  showIdle(false);
  showLoader(true);
  sendBtn.disabled = true;

  try {
    // 1. Submit to agent-mcp via our proxy (retry once — Safari drops first post-load request)
    let submitResp;
    for (let attempt = 0; attempt < 3; attempt++) {
      try {
        if (attempt > 0) await new Promise(r => setTimeout(r, 600));
        submitResp = await fetch('/api/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...authHeaders() },
          body: JSON.stringify({ text, client_id: SESSION_ID }),
        });
        if (submitResp.ok) break;
      } catch (_) { if (attempt === 2) throw new Error('Submit failed after retries'); }
    }
    if (!submitResp?.ok) {
      throw new Error('Submit failed: ' + submitResp?.status);
    }

    showLoader(false);
    setStatus('RECEIVING', true);

    // 2. Open SSE stream — pass token via query param (EventSource can't set headers)
    const evtSource = new EventSource(authedUrl(`/api/stream/${SESSION_ID}`));

    // Use onmessage (unnamed events) for cross-browser compatibility
    let streamDone = false;
    evtSource.onmessage = (e) => {
      if (streamDone) return;
      try {
        const data = JSON.parse(e.data);
        if (data.type === 'tok') {
          const token = data.text || '';
          if (token) {
            appendToPanel(token);
            enqueueTokens(token);
          }
        } else if (data.type === 'vtok') {
          // Voice token pre-delivered over SSE — cache it for speakWithSamaritan
          cachedVtok = data.token;
        } else if (data.type === 'done') {
          streamDone = true;
          evtSource.close();
          isStreaming = false;
          showLoader(false);
          sendBtn.disabled = false;

          const kwCards = parseKeywordCards(fullResponse);
          if (kwCards.length) renderKeywordCards(kwCards);

          if (fullVoiceMode) {
            const ttsText = fullResponse
              .replace(/\[thinking[^\]]*\]/gi, '')
              .replace(/\[[^\]]*▶[^\]]*\][^\n]*/g, '')
              .replace(/\n{3,}/g, '\n\n')
              .trim()
              .slice(0, 200);  // cap TTS to ~10s of audio
            wordQueue = [];
            wordAnimating = false;
            if (ttsText) {
              speakWithSamaritan(ttsText, wasKbd);
            } else {
              waitForDrainThenListen(wasKbd);
            }
          } else {
            const wordCount = fullResponse.trim().split(/\s+/).filter(w => w).length;
            if (wordCount >= LONG_RESPONSE_THRESHOLD) {
              wordQueue = [];
              wordAnimating = false;
              runTerminal(fullResponse.trim(), () => waitForDrainThenListen(wasKbd));
            } else {
              waitForDrainThenListen(wasKbd);
            }
          }
        } else if (data.type === 'error') {
          streamDone = true;
          evtSource.close();
          isStreaming = false;
          showLoader(false);
          showIdle(false);
          sendBtn.disabled = false;
          flashError(data.message || 'stream error');
          if (fullVoiceMode) {
            waitForDrainThenListen(wasKbd);
          } else {
            setStatus('ERROR', false);
          }
        }
      } catch (_) {}
    };

    // Native onerror (connection drop)
    evtSource.onerror = () => {
      if (streamDone) return;
      if (evtSource.readyState === EventSource.CLOSED) {
        isStreaming = false;
        showLoader(false);
        showIdle(false);
        setStatus('STANDBY', false);
        sendBtn.disabled = false;
      }
    };

  } catch (err) {
    isStreaming = false;
    showLoader(false);
    showIdle(false);
    setStatus('ERROR', false);
    sendBtn.disabled = false;
    flashError(err.message || 'unknown error');
  }
}

// ── Event listeners ──────────────────────────────────────────
sendBtn.addEventListener('click', () => { if (fullVoiceMode) initAudioCtx(); submit(); });
textInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') submit();
});

// ── Auto-restart mic after response drains ───────────────────
// Called when the 'done' SSE event fires. Polls until the word
// animation queue is empty, then restarts recognition if in voice mode.
function waitForDrainThenListen(wasKbd) {
  if (wordAnimating || wordQueue.length > 0) {
    setTimeout(() => waitForDrainThenListen(wasKbd), 150);
    return;
  }
  // Queue drained (or terminal finished) — settle UI and start idle countdown
  showIdle(false);     // hide idle message until timeout fires
  // Show accumulated response text now that animation is done (if terminal not active)
  if (!terminalPanel.classList.contains('active') && fullResponse) {
    responsePanel.textContent = fullResponse;
    responsePanel.classList.add('active');
    responsePanel.scrollTop = responsePanel.scrollHeight;
  }
  // Terminal panel intentionally left visible — persists until next submit
  resetIdleTimer();    // idle screen appears only after IDLE_TIMEOUT_SEC of inactivity

  if (fullVoiceMode && !wasKbd && !micBtn.classList.contains('unsupported')) {
    // Full-voice mode (voice input): wait for audio to finish then reopen mic.
    const audioEndMs = audioCtx
      ? Math.max(0, (nextPlayAt - audioCtx.currentTime) * 1000)
      : 0;
    setTimeout(() => {
      nextPlayAt = 0;
      if (!isStreaming && !isListening) {
        voiceMode = true;
        sttProviders[STT_PROVIDER]?.start();
      }
    }, audioEndMs + 800);
    return;
  }

  setStatus('STANDBY', false);
  if (wasKbd) {
    // Keyboard mode: reopen input panel so user can type the next message
    setTimeout(() => {
      setKbdMode(true);
      textInput.focus();
    }, 300);
  } else if (voiceMode && !micBtn.classList.contains('unsupported')) {
    // Voice mode: restart mic
    setTimeout(() => {
      if (!isStreaming && !isListening) {
        sttProviders[STT_PROVIDER]?.start();
      }
    }, 400);
  }
}

// ── Voice Input — STT provider registry ──────────────────────
// Each provider implements: start(), stop()
// Shared state used by both providers:
let isListening = false;

function onSttStart() {
  isListening = true;
  micBtn.classList.add('listening');
  micIcon.textContent = '●';
  voicePreview.textContent = '…';
  setStatus('LISTENING', true);
}

function onSttPartial(text) {
  voicePreview.textContent = text.toUpperCase().slice(0, 60) || '…';
  // Barge-in: any speech heard → stop TTS immediately
  if (isSpeaking) ttsProviders[TTS_PROVIDER].stop();
}

function onSttFinal(text) {
  const query = text.trim();
  if (!query) return;
  if (kbdOpen) {
    textInput.value = (textInput.value + ' ' + query).trim();
  } else {
    submit(query);
  }
}

function onSttStop() {
  isListening = false;
  micBtn.classList.remove('listening');
  micIcon.textContent = '🎤';
  if (!isStreaming) {
    setStatus('STANDBY', false);
    if (!kbdOpen) voicePreview.textContent = 'TAP MIC TO SPEAK';
  }
}

// ── Provider: Web Speech API ──────────────────────────────────
const _ws = (() => {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return null;

  const rec = new SpeechRecognition();
  rec.continuous      = false;
  rec.interimResults  = true;
  rec.lang            = DG_LANGUAGE;
  rec.maxAlternatives = 1;

  let pendingTranscript = '';
  let didSubmit = false;

  rec.onstart = () => onSttStart();

  rec.onresult = (event) => {
    let interim = '', final = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const t = event.results[i][0].transcript;
      if (event.results[i].isFinal) final += t; else interim += t;
    }
    const heard = (final || interim).trim();
    if (heard) pendingTranscript = heard;
    onSttPartial(heard);
    if (final) { didSubmit = true; pendingTranscript = ''; onSttFinal(final); }
  };

  rec.onerror = (e) => {
    if (e.error !== 'no-speech') flashError('mic: ' + e.error);
    onSttStop();
  };

  rec.onend = () => {
    if (!didSubmit && pendingTranscript && !kbdOpen && !isStreaming) {
      didSubmit = true;
      onSttFinal(pendingTranscript);
    }
    pendingTranscript = '';
    didSubmit = false;
    onSttStop();
  };

  return {
    start() { try { rec.start(); } catch (e) { flashError('mic: ' + e.message.slice(0, 30)); } },
    stop()  { try { rec.stop();  } catch (_) {} },
  };
})();

// ── Provider: Deepgram (browser WebSocket + AudioWorklet PCM) ─
const _dg = (() => {
  let dgKey    = null;   // fetched once from /api/stt-token
  let dgWs     = null;
  let audioCtxDg = null;
  let workletNode = null;
  let mediaStream = null;
  let active   = false;

  // Inline AudioWorklet processor as a Blob URL — sends 256-sample PCM chunks
  const WORKLET_CODE = `
class PcmCapture extends AudioWorkletProcessor {
  process(inputs) {
    const ch = inputs[0][0];
    if (ch) this.port.postMessage(ch.buffer, [ch.buffer]);
    return true;
  }
}
registerProcessor('pcm-capture', PcmCapture);`;

  async function fetchKey() {
    if (dgKey) return dgKey;
    const resp = await fetch('/api/stt-token', { headers: authHeaders() });
    if (!resp.ok) throw new Error('stt-token ' + resp.status);
    dgKey = (await resp.json()).key;
    return dgKey;
  }

  async function startDg() {
    active = true;
    onSttStart();
    try {
      const key = await fetchKey();

      // Get mic + AudioContext first so we know the real sample rate before connecting
      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      } catch (e) {
        flashError('mic denied: ' + e.message.slice(0, 30));
        active = false; onSttStop(); return;
      }
      audioCtxDg = new AudioContext();
      const actualRate = audioCtxDg.sampleRate;
      flashError('DG rate=' + actualRate);

      const params = new URLSearchParams({
        model:              DG_MODEL,
        encoding:           DG_ENCODING,
        sample_rate:        actualRate,
        language:           DG_LANGUAGE,
        interim_results:    DG_INTERIM_RESULTS,
        punctuate:          DG_PUNCTUATE,
        endpointing:        DG_EOT_TIMEOUT_MS,
        utterance_end_ms:   DG_EOT_TIMEOUT_MS,
        vad_events:         true,
      });
      dgWs = new WebSocket(`wss://api.deepgram.com/v1/listen?${params}`,
                           ['token', key]);
      dgWs.binaryType = 'arraybuffer';
      dgWs.onopen = async () => {
        flashError('DG open — wiring audio');
        const source = audioCtxDg.createMediaStreamSource(mediaStream);

        // Try AudioWorklet first; fall back to ScriptProcessorNode for iOS Safari
        let usedWorklet = false;
        try {
          const blob    = new Blob([WORKLET_CODE], { type: 'application/javascript' });
          const blobUrl = URL.createObjectURL(blob);
          await audioCtxDg.audioWorklet.addModule(blobUrl);
          URL.revokeObjectURL(blobUrl);
          workletNode = new AudioWorkletNode(audioCtxDg, 'pcm-capture');
          workletNode.port.onmessage = (e) => sendPcm(new Float32Array(e.data));
          source.connect(workletNode);
          usedWorklet = true;
          flashError('DG using AudioWorklet');
        } catch (_) {}

        if (!usedWorklet) {
          // ScriptProcessorNode fallback (512 samples, stereo ignored)
          const spn = audioCtxDg.createScriptProcessor(4096, 1, 1);
          spn.onaudioprocess = (ev) => sendPcm(ev.inputBuffer.getChannelData(0));
          source.connect(spn);
          spn.connect(audioCtxDg.destination); // required to keep spn alive (silent output)
          workletNode = spn; // reuse slot for cleanup
          flashError('DG using ScriptProcessor');
        }
      };

      function sendPcm(f32) {
        if (!dgWs || dgWs.readyState !== WebSocket.OPEN) return;
        const i16 = new Int16Array(f32.length);
        for (let i = 0; i < f32.length; i++)
          i16[i] = Math.max(-32768, Math.min(32767, f32[i] * 32768));
        dgWs.send(i16.buffer);
      }

      let pendingFinal = '';  // accumulate is_final segments until UtteranceEnd
      dgWs.onmessage = (e) => {
        let msg;
        try { msg = JSON.parse(e.data); } catch (_) { return; }
        flashError('DG msg: ' + msg.type);
        if (msg.type === 'Metadata') return;
        if (msg.type === 'UtteranceEnd') {
          // utterance_end_ms fired — submit whatever we've accumulated
          const text = pendingFinal.trim();
          pendingFinal = '';
          if (text) { onSttPartial(text); onSttFinal(text); }
          return;
        }
        if (msg.type !== 'Results') return;
        const alt = msg.channel?.alternatives?.[0];
        if (!alt) return;
        const transcript = (alt.transcript || '').trim();
        if (!msg.is_final) {
          if (transcript) onSttPartial(transcript);
        } else {
          // is_final segment — accumulate; speech_final also submits immediately
          if (transcript) pendingFinal += (pendingFinal ? ' ' : '') + transcript;
          if (msg.speech_final && pendingFinal) {
            const text = pendingFinal.trim();
            pendingFinal = '';
            onSttPartial(text);
            onSttFinal(text);
          }
        }
      };
      dgWs.onerror = (ev) => { flashError('DG WS error'); stopDg(); onSttStop(); };
      dgWs.onclose = (ev) => {
        flashError('DG closed code=' + ev.code);
        if (active) { active = false; stopDg(); onSttStop(); }
      };
    } catch (err) {
      flashError('DG: ' + String(err).slice(0, 40));
      active = false;
      onSttStop();
    }
  }

  function stopDg() {
    active = false;
    if (workletNode){ try { workletNode.disconnect(); } catch (_) {} workletNode = null; }
    if (mediaStream){ mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
    if (audioCtxDg) { try { audioCtxDg.close(); }  catch (_) {} audioCtxDg = null; }
    if (dgWs) {
      try {
        // Tell Deepgram we're done so it flushes any remaining audio
        if (dgWs.readyState === WebSocket.OPEN) dgWs.send(JSON.stringify({ type: 'CloseStream' }));
        dgWs.close();
      } catch (_) {}
      dgWs = null;
    }
  }

  return { start: startDg, stop: stopDg };
})();

// ── STT provider map & mic button wiring ─────────────────────
const sttProviders = { webspeech: _ws, deepgram: _dg };

// STT provider toggle button (reuse same pattern as TTS)
const sttProviderBtn = document.getElementById('stt-provider-btn');
(function() {
  function updateSttBtn() {
    sttProviderBtn.textContent = 'STT: ' + STT_PROVIDER.toUpperCase();
  }
  const order = Object.keys(sttProviders).filter(k => sttProviders[k]);
  updateSttBtn();
  sttProviderBtn.addEventListener('click', () => {
    if (isListening) return;   // don't switch mid-listen
    const idx = order.indexOf(STT_PROVIDER);
    STT_PROVIDER = order[(idx + 1) % order.length];
    updateSttBtn();
  });
})();

// ── Mic button ───────────────────────────────────────────────
if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
  micBtn.classList.add('unsupported');
  micBtn.title = 'Voice requires HTTPS';
  voicePreview.textContent = 'HTTPS REQUIRED FOR MIC';
} else {
  micBtn.addEventListener('click', () => {
    if (micBtn.classList.contains('unsupported')) return;
    resetIdleTimer();
    const provider = sttProviders[STT_PROVIDER];
    if (!provider) { flashError('STT provider unavailable'); return; }
    if (isListening) {
      voiceMode = false;
      provider.stop();
    } else {
      voiceMode = true;
      provider.start();
    }
  });
  // Mark unsupported if webspeech default and not available
  if (STT_PROVIDER === 'webspeech' && !_ws) {
    micBtn.classList.add('unsupported');
    micBtn.title = 'Voice input not supported in this browser — switch to Deepgram';
  }
}

// ── Initial state ─────────────────────────────────────────────
showIdle(true);
showLoader(false);
setStatus('STANDBY', false);
resetIdleTimer();   // start idle countdown immediately on page load
// Do NOT focus the text input on load — prevents iOS keyboard from popping up
</script>

</body>
</html>
